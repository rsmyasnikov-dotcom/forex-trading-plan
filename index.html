<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Scanner Pro v4</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#060c14;color:#ccdde8;font-family:'Courier New',monospace;overflow-x:hidden}
        ::-webkit-scrollbar{width:0;height:0}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const {useState,useEffect,useRef}=React;
        const PAIRS=["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","NZD/USD","USD/CHF","GBP/JPY"];
        
        async function fetchLivePrices(pairs){
            const toYahoo=p=>p.replace("/","")+"=X";
            const race=(fn,ms=4000)=>Promise.race([fn(),new Promise((_,r)=>setTimeout(()=>r(new Error("to")),ms))]);
            try{
                const s=pairs.map(toYahoo).join(",");
                const d=await(await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s}`)).json();
                const out={};
                for(const q of d?.quoteResponse?.result||[]){
                    const p=pairs.find(x=>toYahoo(x)===q.symbol);
                    if(p&&q.regularMarketPrice) out[p]=parseFloat(q.regularMarketPrice.toFixed(5));
                }
                return out;
            }catch(_){
                try{
                    const d=await(await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json")).json();
                    const out={};
                    for(const pair of pairs){
                        const [b,q]=pair.split("/");
                        let v=q==="USD"?1/d.usd[b.toLowerCase()]:b==="USD"?d.usd[q.toLowerCase()]:d.usd[q.toLowerCase()]/d.usd[b.toLowerCase()];
                        if(isFinite(v)&&v>0) out[pair]=parseFloat(v.toFixed(5));
                    }
                    return out;
                }catch(_){return{}}
            }
        }

        function offlineAnalysis(pair,price,isDeep){
            const p=parseFloat(price)||1.0;
            const isJPY=pair.includes("JPY");
            const fmt=v=>v.toFixed(isJPY?3:4);
            const atr=isJPY?0.08:0.0008;
            const step=isJPY?0.5:0.005;
            const nearRes=Math.ceil(p/step)*step;
            const nearSup=Math.floor(p/step)*step;
            const bias=(nearRes-p)<(p-nearSup)?"sell":"buy";
            const seed=Math.floor(p*10000)%1000;
            const rnd=(min,max)=>min+((seed*9301+49297)%233280)/233280*(max-min);
            const conf=Math.round(rnd(52,72));
            
            const buySL=parseFloat(fmt(nearSup-atr*1.5));
            const buyEntry=parseFloat(fmt(nearSup+atr*0.3));
            const buyTP1=parseFloat(fmt(buyEntry+Math.abs(buyEntry-buySL)*2.2));
            const sellSL=parseFloat(fmt(nearRes+atr*1.5));
            const sellEntry=parseFloat(fmt(nearRes-atr*0.3));
            const sellTP1=parseFloat(fmt(sellEntry-Math.abs(sellSL-sellEntry)*2.2));
            
            const base={
                mode:isDeep?"deep":"quick",
                context:`${pair}: ${fmt(p)} — технический анализ`,
                _offline:true,
                signal:bias,
                confidence:conf,
                entry_num:bias==="buy"?buyEntry:sellEntry,
                entry_zone:bias==="buy"?`${fmt(nearSup)}-${fmt(buyEntry)}`:`${fmt(sellEntry)}-${fmt(nearRes)}`,
                sl_num:bias==="buy"?buySL:sellSL,
                sl:bias==="buy"?fmt(buySL):fmt(sellSL),
                tp1_num:bias==="buy"?buyTP1:sellTP1,
                tp1:bias==="buy"?fmt(buyTP1):fmt(sellTP1),
                regime:"range",
                reason:`Цена у ${bias==="buy"?"поддержки":"сопротивления"}`,
                news_risk:"medium"
            };
            if(!isDeep)return base;
            return{...base,
                market_regime:{type:"range",subtype:bias==="buy"?"bullish_trend":"bearish_trend",description:`Цена у ${bias==="buy"?"поддержки":"сопротивления"}`,score:conf},
                confidence:{score:conf,breakdown:{MTF:Math.round(rnd(50,75)),"Структура":Math.round(rnd(50,75)),"OB/FVG":Math.round(rnd(45,70)),"Новости":Math.round(rnd(40,65)),DXY:Math.round(rnd(45,70))}},
                sr_levels:[
                    {type:"resistance",price:fmt(nearRes),price_num:nearRes,strength:4,description:"Ближайшее сопротивление"},
                    {type:"support",price:fmt(nearSup),price_num:nearSup,strength:4,description:"Ближайшая поддержка"}
                ],
                buy:{entry_zone:`${fmt(nearSup)}-${fmt(buyEntry)}`,entry_num:buyEntry,stop_loss:fmt(buySL),sl_num:buySL,tp1:fmt(buyTP1),tp1_num:buyTP1,confidence:Math.round(rnd(60,75)),pattern:"Отбой от поддержки",reasoning:`Цена у ${fmt(nearSup)}`},
                sell:{entry_zone:`${fmt(sellEntry)}-${fmt(nearRes)}`,entry_num:sellEntry,stop_loss:fmt(sellSL),sl_num:sellSL,tp1:fmt(sellTP1),tp1_num:sellTP1,confidence:Math.round(rnd(60,75)),pattern:"Отбой от сопротивления",reasoning:`Цена у ${fmt(nearRes)}`},
                mtf:{h1:{trend:bias==="buy"?"bull":"bear",structure:"Уровневый анализ"},h4:{trend:bias==="buy"?"bull":"bear",structure:"Уровневый анализ"},daily:{trend:"neutral",structure:"Нет данных"},weekly:{trend:"neutral",structure:"Нет данных"},signal:bias==="buy"?"weak_buy":"weak_sell",aligned:2,signal_text:"Офлайн-режим"},
                tips:{best_session:"Лондон/Нью-Йорк",confirmation:"Закрытие H1 свечи",avoid:"Вход без подтверждения",checklist:["Цена у уровня","H1 подтвердила","Нет новостей 30 мин"],max_trades:"Максимум 2 сделки"}
            };
        }

        function getMoscowTime(){return new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit",second:"2-digit",timeZone:"Europe/Moscow"})}
        function getSession(){
            const h=parseInt(new Date().toLocaleTimeString("ru-RU",{hour:"2-digit",timeZone:"Europe/Moscow"}));
            if(h>=10&&h<19)return{name:"ЛОНДОН",color:"#22cc88"};
            if(h>=16&&h<24)return{name:"НЬЮ-ЙОРК",color:"#e8c94a"};
            if(h>=3&&h<12)return{name:"АЗИЯ",color:"#7fb3e0"};
            return{name:"ОФМАРКЕТ",color:"#8899bb"};
        }

        // ─── Components ───────────────────────────────────────────────────────────────
        function ConfidenceMeter({score,breakdown}){
            if(!score)return null;
            const pct=Math.min(100,Math.max(0,Number(score)));
            const c=pct>=75?"#22cc88":pct>=55?"#f0d060":"#ff5566";
            const circ=2*Math.PI*26,off=circ-(pct/100)*circ;
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${c}28`,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:10,fontWeight:700}}>AI УВЕРЕННОСТЬ</div>
                    <div style={{display:"flex",alignItems:"center",gap:16}}>
                        <div style={{position:"relative",width:68,height:68,flexShrink:0}}>
                            <svg width="68" height="68" viewBox="0 0 68 68" style={{transform:"rotate(-90deg)"}}>
                                <circle cx="34" cy="34" r="26" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="5"/>
                                <circle cx="34" cy="34" r="26" fill="none" stroke={c} strokeWidth="5" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
                            </svg>
                            <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                                <span style={{fontSize:17,fontWeight:700,color:c}}>{pct}</span>
                                <span style={{fontSize:8,color:"#ccdde8"}}>%</span>
                            </div>
                        </div>
                        <div style={{flex:1}}>
                            <div style={{fontSize:12,fontWeight:700,color:c,marginBottom:7}}>{pct>=75?"ВЫСОКАЯ":pct>=55?"СРЕДНЯЯ":"НИЗКАЯ"}</div>
                            {breakdown&&Object.entries(breakdown).slice(0,3).map(([k,v])=>(
                                <div key={k} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
                                    <div style={{fontSize:10,color:"#aabbdd",width:80}}>{k}</div>
                                    <div style={{flex:1,height:3,borderRadius:2,background:"rgba(255,255,255,.07)"}}>
                                        <div style={{height:"100%",width:`${v}%`,background:c,borderRadius:2}}/>
                                    </div>
                                    <div style={{fontSize:10,color:"#ccdde8",width:28,textAlign:"right"}}>{v}%</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function SetupCard({data,isBuy}){
            if(!data)return null;
            const accent=isBuy?"#22dd88":"#ff6677";
            const bg=isBuy?"rgba(6,18,14,.97)":"rgba(20,6,8,.97)";
            const border=isBuy?"rgba(34,204,136,.38)":"rgba(255,68,85,.38)";
            const rr=data.entry_num&&data.sl_num&&data.tp1_num?(Math.abs(data.tp1_num-data.entry_num)/Math.abs(data.entry_num-data.sl_num)).toFixed(2):"—";
            return(
                <div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,padding:"16px 14px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
                        <div style={{background:`${accent}22`,border:`1px solid ${accent}77`,borderRadius:8,padding:"5px 12px",fontSize:14,fontWeight:700,letterSpacing:2,color:accent}}>
                            {isBuy?"▲ BUY":"▼ SELL"} LIMIT
                        </div>
                        <div style={{background:"rgba(240,208,96,.1)",border:"1px solid rgba(240,208,96,.35)",borderRadius:20,padding:"4px 10px",fontSize:12,color:"#f0d060",fontWeight:700}}>
                            R:R {rr}
                        </div>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"11px 14px",marginBottom:10}}>
                        <div>
                            <div style={{fontSize:9,color:"#bbddee",letterSpacing:1,marginBottom:3}}>ВХОД</div>
                            <div style={{fontSize:16,fontWeight:700,color:"#f0d060"}}>{data.entry_zone}</div>
                        </div>
                        <div>
                            <div style={{fontSize:9,color:"#bbddee",letterSpacing:1,marginBottom:3}}>СТОП ЛОСС</div>
                            <div style={{fontSize:16,fontWeight:700,color:"#ff7788"}}>{data.stop_loss||data.sl}</div>
                        </div>
                        <div>
                            <div style={{fontSize:9,color:"#bbddee",letterSpacing:1,marginBottom:3}}>ТЕЙК ПРОФИТ</div>
                            <div style={{fontSize:16,fontWeight:700,color:"#22dd88"}}>{data.tp1}</div>
                        </div>
                    </div>
                    {data.reasoning&&<div style={{fontSize:11,color:"#ccdde8",lineHeight:1.6,paddingTop:8,borderTop:"1px solid rgba(255,255,255,.05)"}}>{data.reasoning}</div>}
                </div>
            );
        }

        function SRLevelsCard({levels,currentPrice}){
            if(!levels||!levels.length)return null;
            const sorted=[...levels].sort((a,b)=>Number(b.price_num)-Number(a.price_num));
            const cp=Number(currentPrice);
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:"1px solid rgba(100,160,220,.18)",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:10,fontWeight:700}}>КЛЮЧЕВЫЕ УРОВНИ</div>
                    {sorted.map((lvl,i)=>{
                        const tc=lvl.type==="resistance"?"#ff6677":"#22dd88";
                        const isAbove=cp&&Number(lvl.price_num)>cp;
                        const isBelow=cp&&Number(lvl.price_num)<cp;
                        return(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:8,background:"rgba(17,29,42,.7)",border:`1px solid ${tc}1e`,marginBottom:5}}>
                                <div style={{width:50,fontSize:10,fontWeight:700,color:tc}}>{lvl.type==="resistance"?"СОПР":"ПОДД"}</div>
                                <div style={{fontSize:14,fontWeight:700,color:isAbove?"#ff8899":isBelow?"#44eebb":"#f0d060",flex:1}}>{lvl.price}</div>
                                <div style={{flex:1,height:3,borderRadius:2,background:"rgba(255,255,255,.07)"}}>
                                    <div style={{height:"100%",width:`${((lvl.strength||3)/5)*100}%`,background:tc,opacity:.7}}/>
                                </div>
                            </div>
                        );
                    })}
                    {cp&&<div style={{marginTop:8,textAlign:"center",fontSize:10,color:"#bbddee"}}>◈ ТЕКУЩАЯ ЦЕНА ≈ {cp.toFixed(4)}</div>}
                </div>
            );
        }

        function MarketRegimeCard({regime}){
            if(!regime)return null;
            const icons={trend:"📈",bullish_trend:"📈",bearish_trend:"📉",range:"↔",pullback:"↩",expansion:"⚡",compression:"▣",choppy:"⚠"};
            const colors={trend:"#22cc88",bullish_trend:"#22cc88",bearish_trend:"#ff5566",range:"#7fb3e0",pullback:"#e8c94a",expansion:"#ff9944",compression:"#8899aa",choppy:"#ff5566"};
            const r=icons[regime.subtype]||icons[regime.type]||{icon:"◆",c:"#8899aa"};
            const c=colors[regime.subtype]||colors[regime.type]||"#8899aa";
            const score=Math.min(100,Math.max(0,Number(regime.score)||50));
            const circ=2*Math.PI*18,off=circ-(score/100)*circ;
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${c}30`,borderRadius:12,padding:"12px 14px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:10,fontWeight:700}}>РЕЖИМ РЫНКА</div>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                        <div style={{position:"relative",width:46,height:46,flexShrink:0}}>
                            <svg width="46" height="46" viewBox="0 0 46 46" style={{transform:"rotate(-90deg)"}}>
                                <circle cx="23" cy="23" r="18" fill="none" stroke="rgba(255,255,255,.09)" strokeWidth="3.5"/>
                                <circle cx="23" cy="23" r="18" fill="none" stroke={c} strokeWidth="3.5" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round"/>
                            </svg>
                            <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{icons[regime.subtype]||icons[regime.type]||"◆"}</div>
                        </div>
                        <div style={{flex:1}}>
                            <div style={{fontSize:13,fontWeight:700,color:c,marginBottom:5}}>{(regime.subtype||regime.type||"unknown").toUpperCase()} · {score}</div>
                            <div style={{fontSize:11,color:"#ccdde8",lineHeight:1.5}}>{regime.description}</div>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Main App ─────────────────────────────────────────────────────────────────
        function App(){
            const [pair,setPair]=useState("EUR/USD");
            const [loading,setLoading]=useState(false);
            const [result,setResult]=useState(null);
            const [error,setError]=useState(null);
            const [clock,setClock]=useState(getMoscowTime());
            const [session,setSession]=useState(getSession());
            const [mode,setMode]=useState("deep");
            const [livePrice,setLivePrice]=useState(null);
            const [dots,setDots]=useState(0);
            
            useEffect(()=>{
                const iv=setInterval(()=>{setClock(getMoscowTime());setSession(getSession());},1000);
                return()=>clearInterval(iv);
            },[]);
            
            useEffect(()=>{
                if(!loading)return;
                const i1=setInterval(()=>setDots(d=>(d+1)%4),400);
                return()=>clearInterval(i1);
            },[loading]);

            const scan=async()=>{
                if(loading)return;
                setLoading(true);setError(null);setResult(null);
                try{
                    const prices=await fetchLivePrices([pair]);
                    const price=prices[pair];
                    setLivePrice(price||null);
                    
                    // Simulate AI delay
                    await new Promise(r=>setTimeout(r,1500));
                    
                    const parsed=offlineAnalysis(pair,price||1.15,mode==="deep");
                    setResult(parsed);
                }catch(e){
                    setError(e.message);
                }finally{
                    setLoading(false);
                }
            };

            const currentPrice=result?.buy?.entry_num||result?.sell?.entry_num||livePrice;

            return(
                <div style={{minHeight:"100vh",background:"#060c14",paddingBottom:100}}>
                    {/* Header */}
                    <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(6,12,20,.98)",borderBottom:"1px solid rgba(100,160,220,.14)",padding:"10px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <div>
                                <div style={{fontSize:13,color:"#eef5ff",letterSpacing:2,fontWeight:700}}>
                                    FX SCANNER <span style={{fontSize:9,color:"#22cc88",border:"1px solid rgba(34,204,136,.32)",borderRadius:4,padding:"1px 5px"}}>v4</span>
                                </div>
                                <div style={{fontSize:8,color:"#bbddee",letterSpacing:2}}>OB · FVG · СТРУКТУРА · AI</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                                <div style={{fontSize:13,color:"#eef5ff",fontWeight:700}}>{clock}</div>
                                <div style={{display:"flex",alignItems:"center",gap:4,justifyContent:"flex-end"}}>
                                    <div style={{width:5,height:5,borderRadius:"50%",background:session.color}}/>
                                    <div style={{fontSize:9,color:session.color,fontWeight:700}}>{session.name}</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style={{padding:"12px 12px 20px"}}>
                        {/* Pair Selector */}
                        <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8,fontWeight:600}}>ВАЛЮТНАЯ ПАРА</div>
                        <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
                            {PAIRS.map(p=>(
                                <div key={p} onClick={()=>{setPair(p);setResult(null);}}
                                    style={{flexShrink:0,background:p===pair?"rgba(34,204,136,.15)":"rgba(17,29,42,.9)",border:`1px solid ${p===pair?"rgba(34,204,136,.58)":"rgba(100,160,220,.18)"}`,borderRadius:20,padding:"8px 14px",fontSize:12,color:p===pair?"#22dd88":"#aabbcc",cursor:"pointer",fontWeight:p===pair?700:500}}>
                                    {p}
                                </div>
                            ))}
                        </div>

                        {/* Mode Selector */}
                        <div style={{display:"flex",gap:6,marginBottom:10}}>
                            {[{id:"quick",label:"⚡ БЫСТРЫЙ"},{id:"deep",label:"🔬 ГЛУБОКИЙ"}].map(m=>(
                                <div key={m.id} onClick={()=>setMode(m.id)}
                                    style={{flex:1,padding:"10px",borderRadius:10,textAlign:"center",cursor:"pointer",
                                        background:mode===m.id?"rgba(34,204,136,.12)":"rgba(17,29,42,.8)",
                                        border:`1px solid ${mode===m.id?"rgba(34,204,136,.45)":"rgba(100,160,220,.13)"}`,
                                        color:mode===m.id?"#22dd88":"#8899aa",fontWeight:700}}>
                                    {m.label}
                                </div>
                            ))}
                        </div>

                        {/* Live Price */}
                        {livePrice&&(
                            <div style={{padding:"10px 14px",background:"rgba(34,204,136,.08)",border:"1px solid rgba(34,204,136,.25)",borderRadius:10,marginBottom:12,textAlign:"center"}}>
                                <span style={{fontSize:10,color:"#22dd88"}}>💹 {pair} = {livePrice}</span>
                            </div>
                        )}

                        {error&&<div style={{background:"rgba(255,68,85,.09)",border:"1px solid rgba(255,68,85,.32)",borderRadius:10,padding:"12px",marginBottom:12,color:"#ffaaaa"}}>⚠ {error}</div>}

                        {loading&&(
                            <div style={{textAlign:"center",padding:"40px 20px"}}>
                                <div style={{fontSize:12,color:"#22cc88",letterSpacing:2,animation:"blink 1.2s infinite"}}>
                                    АНАЛИЗИРУЮ{".".repeat(dots)}
                                </div>
                                <div style={{marginTop:20,height:4,borderRadius:2,background:"rgba(255,255,255,.1)",overflow:"hidden"}}>
                                    <div style={{height:"100%",width:"60%",background:"linear-gradient(90deg,#22cc88,#44ffaa)",animation:"shimmer 1.4s infinite",backgroundSize:"200% 100%"}}/>
                                </div>
                            </div>
                        )}

                        {result&&!loading&&(
                            <>
                                <div style={{padding:"10px 14px",marginBottom:12,borderLeft:"2px solid rgba(127,179,224,.45)",fontSize:12,color:"#ccdde8"}}>{result.context}</div>
                                <MarketRegimeCard regime={result.market_regime}/>
                                <ConfidenceMeter score={result.confidence?.score} breakdown={result.confidence?.breakdown}/>
                                <SRLevelsCard levels={result.sr_levels} currentPrice={currentPrice}/>
                                <SetupCard data={result.buy} isBuy={true}/>
                                <SetupCard data={result.sell} isBuy={false}/>
                            </>
                        )}

                        {!result&&!loading&&!error&&(
                            <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed rgba(255,255,255,.07)",borderRadius:14}}>
                                <div style={{fontSize:32,opacity:.15,marginBottom:10}}>◈</div>
                                <div style={{fontSize:12,color:"#8899bb",letterSpacing:2,marginBottom:10}}>ВЫБЕРИ ПАРУ И НАЖМИ СКАНИРОВАТЬ</div>
                                <div style={{fontSize:11,color:"#ccdde8",lineHeight:2}}>Order Block · Fair Value Gap · Liquidity<br/>D1 · H4 · H1 структура</div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Button */}
                    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(6,12,20,.98)",borderTop:"1px solid rgba(100,160,220,.14)",padding:"12px 14px 20px"}}>
                        <button onClick={scan} disabled={loading}
                            style={{width:"100%",height:56,background:loading?"rgba(34,204,136,.04)":"linear-gradient(135deg,rgba(34,204,136,.22),rgba(34,204,136,.09))",border:`1px solid rgba(34,204,136,${loading?.14:.52})`,borderRadius:12,color:loading?"rgba(34,204,136,.35)":"#22dd88",fontSize:16,fontWeight:700,letterSpacing:2,cursor:loading?"not-allowed":"pointer"}}>
                            {loading?`АНАЛИЗИРУЮ${".".repeat(dots)}`:mode==="quick"?"⚡ БЫСТРЫЙ СКАН":"🔬 ГЛУБОКИЙ СКАН"}
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
