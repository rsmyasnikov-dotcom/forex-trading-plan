<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Scanner Pro | Dual AI Engine</title>
    <style>
        :root {
            --bg-main: #060c14; --bg-card: rgba(12, 18, 28, 0.9);
            --bg-card-light: rgba(17, 29, 42, 0.9); --border-color: rgba(100, 160, 220, 0.18);
            --text-primary: #ccdde8; --text-secondary: #aabbdd; --accent-green: #22cc88;
            --accent-red: #ff5566; --accent-yellow: #e8c94a; --accent-blue: #7fb3e0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            background-image: radial-gradient(ellipse at 15% 0%, rgba(0, 50, 100, 0.35) 0%, transparent 55%), radial-gradient(ellipse at 85% 100%, rgba(0, 20, 50, 0.25) 0%, transparent 55%);
            color: var(--text-primary); margin: 0; padding-bottom: 110px;
        }
        .container { max-width: 600px; margin: 0 auto; padding: 12px; }
        .courier { font-family: 'Courier New', Courier, monospace; }
        .header {
            position: sticky; top: 0; z-index: 100; background: rgba(6, 12, 20, 0.95);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color); padding: 10px 14px;
        }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .logo { display: flex; align-items: center; gap: 8px; }
        .logo .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: pulse 2s infinite; }
        .logo-title { font-size: 13px; color: #eef5ff; letter-spacing: 2px; font-weight: 700; }
        .logo-subtitle { font-size: 8px; color: #bbddee; letter-spacing: 2px; }
        .time-info { text-align: right; }
        .clock { font-size: 13px; color: #eef5ff; font-weight: 700; }
        .session { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
        .session-dot { width: 5px; height: 5px; border-radius: 50%; }
        .session-name { font-size: 9px; font-weight: 700; }
        .ai-settings-section { background: var(--bg-card-light); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .section-title { font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; }
        .ai-selector { display: flex; gap: 8px; margin-bottom: 12px; }
        .ai-selector label { flex: 1; text-align: center; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-card); font-size: 12px; cursor: pointer; user-select: none; }
        .ai-selector input { display: none; }
        .ai-selector input:checked + label { border-color: var(--accent-green); background: rgba(34, 204, 136, 0.1); color: var(--accent-green); font-weight: 700; }
        .api-key-input { width: 100%; background: rgba(6, 12, 20, 0.8); border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 10px; font-family: 'Courier New', monospace; font-size: 12px; color: var(--text-primary); outline: none; margin-bottom: 8px; box-sizing: border-box; }
        .api-key-input:focus { border-color: var(--accent-green); }
        .api-key-desc { font-size: 10px; color: #8899aa; line-height: 1.5; }
        .api-key-desc a { color: var(--accent-blue); text-decoration: none; }
        .pair-selector { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
        .pair-selector::-webkit-scrollbar { display: none; }
        .pair-button { flex-shrink: 0; background: var(--bg-card-light); border: 1px solid var(--border-color); border-radius: 20px; padding: 8px 14px; font-size: 12px; color: #aabbcc; cursor: pointer; white-space: nowrap; font-weight: 500; }
        .pair-button.active { background: rgba(34, 204, 136, 0.15); border-color: rgba(34, 204, 136, 0.58); color: var(--accent-green); font-weight: 700; }
        .fixed-bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; background: rgba(6, 12, 20, 0.98); backdrop-filter: blur(16px); border-top: 1px solid var(--border-color); padding: 8px 12px 14px; }
        .scan-button { width: 100%; height: 54px; background: linear-gradient(135deg, rgba(34, 204, 136, 0.22), rgba(34, 204, 136, 0.09)); border: 1px solid rgba(34, 204, 136, 0.52); border-radius: 12px; color: var(--accent-green); font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .scan-button:disabled { background: rgba(34, 204, 136, 0.04); border-color: rgba(34, 204, 136, 0.14); color: rgba(34, 204, 136, 0.35); cursor: not-allowed; }
        .error-card { background: rgba(255, 68, 85, 0.15); border: 1px solid var(--accent-red); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 12px; color: #ffaaaa; line-height: 1.5; }
        .result-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
        .setup-card { border-width: 1.5px; border-radius: 14px; position: relative; overflow: hidden; }
        .setup-card-buy { background: rgba(6, 18, 14, 0.97); border-color: rgba(34, 204, 136, 0.38); }
        .setup-card-sell { background: rgba(20, 6, 8, 0.97); border-color: rgba(255, 68, 85, 0.38); }
        .setup-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .setup-title { padding: 5px 12px; border-radius: 8px; font-size: 14px; font-weight: 700; letter-spacing: 2px; }
        .setup-title-buy { background: rgba(34, 204, 136, 0.18); border: 1px solid rgba(34, 204, 136, 0.5); color: var(--accent-green); }
        .setup-title-sell { background: rgba(255, 68, 85, 0.18); border: 1px solid rgba(255, 68, 85, 0.5); color: var(--accent-red); }
        .setup-pills { display: flex; gap: 6px; font-size: 12px; font-weight: 700; }
        .pill { border-radius: 20px; padding: 4px 10px; }
        .pill-confidence { background: var(--bg-card); border: 1px solid; }
        .pill-rr { background: rgba(240, 208, 96, 0.1); border: 1px solid rgba(240, 208, 96, 0.35); color: #f0d060; }
        .setup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 11px 14px; margin-bottom: 10px; }
        .grid-item .label { font-size: 9px; color: #bbddee; letter-spacing: 1px; margin-bottom: 3px; font-weight: 600; }
        .grid-item .value { font-size: 18px; font-weight: 700; }
        .reasoning { font-size: 11px; line-height: 1.6; padding-top: 8px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .no-trade-card { border: 2px solid rgba(240, 208, 96, 0.28); text-align: center; padding: 20px 16px; }
        .no-trade-card .icon { font-size: 34px; margin-bottom: 8px; }
        .no-trade-card .title { font-size: 15px; font-weight: 700; color: #f0d060; letter-spacing: 3px; margin-bottom: 10px; }
        .no-trade-card .reason { font-size: 12px; line-height: 1.6; margin-bottom: 12px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-top">
            <div class="logo">
                <div class="status-dot"></div>
                <div>
                    <div class="logo-title courier">FX SCANNER PRO</div>
                    <div class="logo-subtitle courier">ДВА AI-ДВИЖКА</div>
                </div>
            </div>
            <div class="time-info">
                <div id="clock" class="clock courier"></div>
                <div id="session" class="session courier"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="ai-settings-section">
            <div class="section-title courier">AI ДВИЖОК И КЛЮЧИ API</div>
            <div class="ai-selector courier">
                <input type="radio" name="ai_engine" id="ai_claude" value="claude" checked>
                <label for="ai_claude">Anthropic Claude</label>
                <input type="radio" name="ai_engine" id="ai_gemini" value="gemini">
                <label for="ai_gemini">Google Gemini</label>
            </div>
            
            <div id="claude-key-container">
                <select id="claude-model-select" class="api-key-input">
                    <option value="claude-3-5-haiku-latest">Модель: Claude 3.5 Haiku (Новая)</option>
                    <option value="claude-3-5-sonnet-latest">Модель: Claude 3.5 Sonnet (Умная)</option>
                </select>
                <input type="password" id="claude-api-key-input" class="api-key-input" placeholder="Введите API-ключ Claude...">
                <div class="api-key-desc">Ключ хранится в браузере. <a href="https://console.anthropic.com/" target="_blank">Получить здесь</a>.</div>
            </div>
            
            <div id="gemini-key-container" style="display: none;">
                <select id="gemini-model-select" class="api-key-input">
                    <option value="gemini-1.5-flash">Модель: Gemini 1.5 Flash (Стабильная)</option>
                    <option value="gemini-1.5-pro">Модель: Gemini 1.5 Pro (Тяжелая)</option>
                </select>
                <input type="password" id="gemini-api-key-input" class="api-key-input" placeholder="Введите API-ключ Gemini...">
                <div class="api-key-desc">Ключ хранится в браузере. <a href="https://aistudio.google.com/app/apikey" target="_blank">Получить здесь</a>.</div>
            </div>
        </div>
        
        <div class="controls-section">
            <div class="section-title courier">ВАЛЮТНАЯ ПАРА</div>
            <div id="pair-selector" class="pair-selector"></div>
        </div>
        
        <div id="output-container">
            <div id="initial-screen" style="text-align: center; padding: 50px 20px; border: 1px dashed rgba(255, 255, 255, 0.07); border-radius: 14px; margin-top: 6px;">
                <div style="font-size: 38px; opacity: 0.12; margin-bottom: 10px;">◈</div>
                <div class="courier" style="font-size: 12px; color: #8899bb; letter-spacing: 2px; margin-bottom: 10px;">ВЫБЕРИТЕ AI И НАЖМИТЕ СКАН</div>
            </div>
        </div>
    </main>

    <div class="fixed-bottom-bar">
        <button id="scan-button" class="scan-button courier">
            <span style="font-size: 16px;">🔬</span>
            <span>ГЛУБОКИЙ СКАН</span>
        </button>
    </div>

<script>
// ===================================================================================
// ─── СЕРДЦЕ СИСТЕМЫ: РАБОТА С AI API ───────────────────────────────────────────────
// ===================================================================================

function extractJSON(text) {
    try { return JSON.parse(text); } catch (e) {
        const match = text.match(/```json\s*([\s\S]*?)\s*```/);
        if (match && match[1]) { try { return JSON.parse(match[1]); } catch (e) {} }
        const startIndex = text.indexOf('{');
        const endIndex = text.lastIndexOf('}');
        if (startIndex !== -1 && endIndex > startIndex) { try { return JSON.parse(text.substring(startIndex, endIndex + 1)); } catch (e) {} }
    }
    throw new Error("Ошибка разбора JSON от AI.");
}

function buildDeepPrompt(pair) {
    const now = new Date();
    const dateStr = now.toLocaleDateString("ru-RU", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
    const timeStr = now.toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Moscow" });
    return `Ты — старший аналитик Forex. Твоя задача — выдать план по паре ${pair} для limit-входа. 
СТРОГИЕ ПРАВИЛА:
- Анализируй D1, H4, H1.
- Используй: Market Structure (BOS, CHoCH), Liquidity, Order Block, FVG, Premium/Discount.
- Вход только у OB/FVG/SR. 
- Stop Loss за технической инвалидацией. 
- Минимум RR: TP1 >= 2.2, TP2 >= 3.2.
- Если сценарий неясен или новости близко (<60 мин) — верни no_trade.
- Возвращай ТОЛЬКО JSON (на русском):
{"context":"...","buy": {"entry_zone":"...","entry_num":0.0,"stop_loss":"...","sl_num":0.0,"sl_reasoning":"...","tp1":"...","tp1_num":0.0,"tp2":"...","tp2_num":0.0,"confidence":75,"reasoning":"..."}, "sell": {"entry_zone":"...","entry_num":0.0,"stop_loss":"...","sl_num":0.0,"sl_reasoning":"...","tp1":"...","tp1_num":0.0,"tp2":"...","tp2_num":0.0,"confidence":75,"reasoning":"..."}, "no_trade": {"reason":"...","wait_for":"..."}}
Если buy или sell некачественные, верни null для них. Если оба плохие — заполни no_trade.`;
}

async function fetchAnalysisFromClaude(apiKey, pair) {
    const model = document.getElementById('claude-model-select').value;
    const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
            "Content-Type": "application/json", "x-api-key": apiKey, "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
            model: model, max_tokens: 1500,
            messages: [{ role: "user", content: buildDeepPrompt(pair) }]
        })
    });
    if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || "Ошибка Claude");
    }
    const data = await response.json();
    return extractJSON(data.content[0]?.text || '');
}

async function fetchAnalysisFromGemini(apiKey, pair) {
    const model = document.getElementById('gemini-model-select').value;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
    const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            contents: [{ parts:[{ text: buildDeepPrompt(pair) }] }],
            generationConfig: { response_mime_type: "application/json" }
        })
    });
    if (!response.ok) {
        const err = await response.json();
        if (response.status === 400 && err.error?.message?.includes("location")) {
            throw new Error("Регион не поддерживается. Включите VPN (USA) для Gemini.");
        }
        if (response.status === 429) {
            throw new Error("Лимит запросов исчерпан (Quota). Подождите немного.");
        }
        throw new Error(err.error?.message || "Ошибка Gemini");
    }
    const data = await response.json();
    return extractJSON(data.candidates[0].content.parts[0].text);
}

// ===================================================================================
// ─── UI КОМПОНЕНТЫ ───────────────────────────────────────────────────────────────
// ===================================================================================

function createSetupCard(data, isBuy) {
    if (!data) return '';
    const rr = (Math.abs(data.tp1_num - data.entry_num) / Math.abs(data.entry_num - data.sl_num)).toFixed(2);
    let confColor = data.confidence >= 75 ? 'var(--accent-green)' : (data.confidence >= 55 ? 'var(--accent-yellow)' : 'var(--accent-red)');
    return `
    <div class="result-card setup-card ${isBuy ? 'setup-card-buy' : 'setup-card-sell'}">
        <div class="setup-header">
            <div class="setup-title courier ${isBuy ? 'setup-title-buy' : 'setup-title-sell'}">${isBuy ? '▲ BUY LIMIT' : '▼ SELL LIMIT'}</div>
            <div class="setup-pills courier"><div class="pill pill-confidence" style="border-color:${confColor}; color:${confColor};">${data.confidence}%</div><div class="pill pill-rr">R:R ${rr}</div></div>
        </div>
        <div class="setup-grid courier">
            <div class="grid-item"><div class="label">ВХОД (ЗОНА)</div><div class="value" style="color: var(--accent-yellow);">${data.entry_zone}</div></div>
            <div class="grid-item"><div classLocation="label">СТОП ЛОСС</div><div class="value" style="color: var(--accent-red);">${data.stop_loss}</div></div>
            <div class="grid-item"><div class="label">ТЕЙК ПРОФИТ 1</div><div class="value" style="color: var(--accent-green);">${data.tp1}</div></div>
            ${data.tp2 ? `<div class="grid-item"><div class="label">ТЕЙК ПРОФИТ 2</div><div class="value" style="color: #55ffcc;">${data.tp2}</div></div>` : ''}
        </div>
        <div class="reasoning">${data.reasoning}</div>
    </div>`;
}

function createNoTradeCard(data) {
    if (!data) return '';
    return `<div class="result-card no-trade-card courier"><div class="icon">🚫</div><div class="title">NO TRADE</div><div class="reason">${data.reason}</div>${data.wait_for ? `<div style="padding: 8px 12px; background: rgba(240, 208, 96, 0.07); border: 1px solid rgba(240, 208, 96, 0.22); border-radius: 8px; font-size: 11px; color: #c8b060; text-align: left;"><span style="color: #f0d060;">⏳ ЖДЁМ: </span>${data.wait_for}</div>` : ''}</div>`;
}

// ===================================================================================
// ─── ГЛАВНОЕ ПРИЛОЖЕНИЕ ────────────────────────────────────────────────────────────
// ===================================================================================
document.addEventListener("DOMContentLoaded", () => {
    const PAIRS = ["EUR/USD", "GBP/USD", "USD/JPY", "AUD/USD", "USD/CAD", "NZD/USD"];
    let currentPair = "EUR/USD";
    let isLoading = false;

    const clockEl = document.getElementById('clock'), sessionEl = document.getElementById('session');
    const claudeApiInputEl = document.getElementById('claude-api-key-input'), geminiApiInputEl = document.getElementById('gemini-api-key-input');
    const claudeModelSelect = document.getElementById('claude-model-select'), geminiModelSelect = document.getElementById('gemini-model-select');
    const pairSelectorEl = document.getElementById('pair-selector'), scanButtonEl = document.getElementById('scan-button');
    const outputContainerEl = document.getElementById('output-container'), initialScreenEl = document.getElementById('initial-screen');
    const claudeKeyContainer = document.getElementById('claude-key-container'), geminiKeyContainer = document.getElementById('gemini-key-container');
    const aiSelectors = document.querySelectorAll('input[name="ai_engine"]');

    function init() {
        claudeApiInputEl.value = localStorage.getItem('claudeApiKey') || '';
        geminiApiInputEl.value = localStorage.getItem('geminiApiKey') || '';
        pairSelectorEl.innerHTML = PAIRS.map(p => `<button class="pair-button courier ${p === currentPair ? 'active' : ''}" data-pair="${p}">${p}</button>`).join('');
        setInterval(updateTime, 1000); updateTime();
        pairSelectorEl.addEventListener('click', e => {
            if (e.target.classList.contains('pair-button')) {
                currentPair = e.target.dataset.pair;
                document.querySelectorAll('.pair-button').forEach(btn => btn.classList.remove('active'));
                e.target.classList.add('active');
                if (initialScreenEl) initialScreenEl.style.display = 'block';
                outputContainerEl.innerHTML = '';
            }
        });
        scanButtonEl.addEventListener('click', runScan);
        aiSelectors.forEach(radio => radio.addEventListener('change', toggleApiInput));
        claudeApiInputEl.addEventListener('input', e => localStorage.setItem('claudeApiKey', e.target.value));
        geminiApiInputEl.addEventListener('input', e => localStorage.setItem('geminiApiKey', e.target.value));
    }

    function toggleApiInput() {
        const selectedAi = document.querySelector('input[name="ai_engine"]:checked').value;
        claudeKeyContainer.style.display = selectedAi === 'claude' ? 'block' : 'none';
        geminiKeyContainer.style.display = selectedAi === 'gemini' ? 'block' : 'none';
    }

    async function runScan() {
        if (isLoading) return;
        const selectedAi = document.querySelector('input[name="ai_engine"]:checked').value;
        const apiKey = selectedAi === 'claude' ? claudeApiInputEl.value : geminiApiInputEl.value;

        if (!apiKey) {
            outputContainerEl.innerHTML = `<div class="error-card">⚠ Ошибка: Введите API-ключ.</div>`;
            return;
        }

        isLoading = true;
        scanButtonEl.disabled = true;
        scanButtonEl.innerHTML = `<span class="loader-text courier">AI АНАЛИЗ...</span>`;
        if (initialScreenEl) initialScreenEl.style.display = 'none';
        outputContainerEl.innerHTML = `<div class="loader-container"><div class="loader-text courier" style="color: var(--accent-green);">ЗАПРОС К ${selectedAi.toUpperCase()}...</div></div>`;

        try {
            const fetchFunction = selectedAi === 'claude' ? fetchAnalysisFromClaude : fetchAnalysisFromGemini;
            const result = await fetchFunction(apiKey, currentPair);
            renderResults(result);
        } catch (error) {
            outputContainerEl.innerHTML = `<div class="error-card">⚠ ${error.message}</div>`;
        } finally {
            isLoading = false;
            scanButtonEl.disabled = false;
            scanButtonEl.innerHTML = `<span style="font-size: 16px;">🔬</span><span>ГЛУБОКИЙ СКАН</span>`;
        }
    }

    function renderResults(result) {
        let html = '';
        if (result.context) html += `<div class="result-card" style="font-size:12px; line-height:1.6; border-left: 2px solid var(--accent-blue);">${result.context}</div>`;
        if (result.no_trade && !result.buy && !result.sell) {
            html += createNoTradeCard(result.no_trade);
        } else {
            const setups = [{ data: result.buy, isBuy: true }, { data: result.sell, isBuy: false }]
                .filter(s => s.data).sort((a, b) => b.data.confidence - a.data.confidence);
            if (setups.length > 0) setups.forEach(s => html += createSetupCard(s.data, s.isBuy)); 
            else html += createNoTradeCard({reason: "Нет качественных сетапов.", wait_for: "Ожидание структуры."});
        }
        outputContainerEl.innerHTML = html;
    }

    function updateTime() {
        const now = new Date(), moscowTime = now.toLocaleTimeString("ru-RU", { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: "Europe/Moscow" });
        clockEl.textContent = moscowTime;
        const h = parseInt(now.toLocaleTimeString("ru-RU", { hour: "2-digit", timeZone: "Europe/Moscow" }));
        let sessionName, sessionColor;
        if (h >= 10 && h < 19) { sessionName = "ЛОНДОН"; sessionColor = "var(--accent-green)"; } 
        else if (h >= 16 && h < 24) { sessionName = "НЬЮ-ЙОРК"; sessionColor = "var(--accent-yellow)"; } 
        else if (h >= 3 && h < 12) { sessionName = "АЗИЯ"; sessionColor = "var(--accent-blue)"; } 
        else { sessionName = "ОФФМАРКЕТ"; sessionColor = "#8899bb"; }
        sessionEl.innerHTML = `<div class="session-dot" style="background-color: ${sessionColor}; box-shadow: 0 0 5px ${sessionColor};"></div><div class="session-name" style="color: ${sessionColor};">${sessionName}</div>`;
    }

    init();
});
</script>
</body>
</html>
