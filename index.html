        function расчетКорреляции(массив1,массив2,период=20){
            const n=Math.min(период,массив1.length,массив2.length);
            if(n<2)return 0;
            const срез1=массив1.slice(-n);
            const срез2=массив2.slice(-n);
            const сред1=срез1.reduce((a,b)=>a+b,0)/n;
            const сред2=срез2.reduce((a,b)=>a+b,0)/n;
            let числ=0,знам1=0,знам2=0;
            for(let i=0;i<n;i++){
                const о1=срез1[i]-сред1;
                const о2=срез2[i]-сред2;
                числ+=о1*о2;
                знам1+=о1*о1;
                знам2+=о2*о2;
            }
            return знам1===0||знам2===0?0:числ/Math.sqrt(знам1*знам2);
        }

        function расчетRSI(цены,период=14){
            if(цены.length<период+1)return 50;
            let прирост=0,падение=0;
            for(let i=цены.length-период;i<цены.length;i++){
                const изменение=цены[i]-цены[i-1];
                if(изменение>0)прирост+=изменение;
                else падение+=Math.abs(изменение);
            }
            const средПрирост=прирост/период;
            const средПадение=падение/период;
            const rs=средПрирост/средПадение;
            return 100-(100/(1+rs));
        }

        function расчетMACD(цены,быстрый=12,медленный=26,сигнал=9){
            const ema=(данные,период)=>{
                const k=2/(период+1);
                let ema=[данные[0]];
                for(let i=1;i<данные.length;i++){
                    ema.push(данные[i]*k+ema[i-1]*(1-k));
                }
                return ema;
            };
            const emaБыстрая=ema(цены,быстрый);
            const emaМедленная=ema(цены,медленный);
            const macdLine=emaБыстрая.map((v,i)=>v-emaМедленная[i]);
            const signalLine=ema(macdLine.slice(медленный-быстрый),сигнал);
            const гистограмма=macdLine.slice(медленный-быстрый+сигнал-1).map((v,i)=>v-signalLine[i]);
            return{macd:macdLine[macdLine.length-1],signal:signalLine[signalLine.length-1],histogram:гистограмма[гистограмма.length-1]};
        }

        function расчетБоллинджера(цены,период=20,множитель=2){
            if(цены.length<период)return{средняя:цены[цены.length-1],верх:цены[цены.length-1],низ:цены[цены.length-1]};
            const срез=цены.slice(-период);
            const средняя=срез.reduce((a,b)=>a+b,0)/период;
            const квадраты=срез.map(ц=>(ц-средняя)**2);
            const стандОтклон=Math.sqrt(квадраты.reduce((a,b)=>a+b,0)/период);
            return{средняя,верх:средняя+множитель*стандОтклон,низ:средняя-множитель*стандОтклон};
        }

        function генерацияСвечей(базоваяЦена,количество=200,таймфрейм="1h",волатильность=0.001){
            const свечи=[];
            let цена=базоваяЦена;
            const тренд=(Math.random()-0.5)*0.0002;
            
            for(let i=0;i<количество;i++){
                const время=Math.floor(Date.now()/1000)-(количество-i)*3600;
                const изменение=(Math.random()-0.5)*волатильность*цена+тренд*цена;
                const открытие=цена;
                цена+=изменение;
                const закрытие=цена;
                const теньВерх=Math.random()*волатильность*цена*0.5;
                const теньНиз=Math.random()*волатильность*цена*0.5;
                
                свечи.push({
                    time:время,
                    open:открытие,
                    high:Math.max(открытие,закрытие)+теньВерх,
                    low:Math.min(открытие,закрытие)-теньНиз,
                    close:закрытие,
                    volume:Math.floor(Math.random()*1000+500)
                });
            }
            return свечи;
        }

        function генерацияПрофиляОбъема(свечи){
            const профиль={};
            const шаг=(Math.max(...свечи.map(с=>с.high))-Math.min(...свечи.map(с=>с.low)))/24;
            
            свечи.forEach(свеча=>{
                for(let цена=свеча.low;цена<=свеча.high;цена+=шаг){
                    const уровень=Math.floor(цена/шаг)*шаг;
                    профиль[уровень]=(профиль[уровень]||0)+свеча.volume;
                }
            });
            
            const сортированный=Object.entries(профиль).sort((a,b)=>b[1]-a[1]);
            return{
                poc:parseFloat(сортированный[0][0]),
                диапазонЗначимости:сортированный.slice(0,3).map(([цена,объем])=>({цена:parseFloat(цена),объем})),
                профиль
            };
        }

        function расчетДисбаланса(свечи){
            const покупки=свечи.slice(-5).filter(с=>с.close>с.open).reduce((a,с)=>a+с.volume,0);
            const продажи=свечи.slice(-5).filter(с=>с.close<с.open).reduce((a,с)=>a+с.volume,0);
            const соотношение=покупки/(продажи||1);
            return{
                соотношение:соотношение.toFixed(2),
                дисбаланс:соотношение>1.5?"бычий":соотношение<0.67?"медвежий":"нейтральный",
                сила:Math.min(100,Math.abs(соотношение-1)*50)
            };
        }

                // Расчёт DXY

                if(пара.includes('USD')){
                    try{
                        const dxyResp=await fetch('https://api.exchangerate-api.com/v4/latest/USD');

                const isJPY=пара.includes('JPY');
                return{

        function ГрафикСИндикаторами({свечи,анализ,выбраннаяПара}){
            const refГрафика=useRef(null);
            const chartRef=useRef(null);
            
            useEffect(()=>{
                if(!refГрафика.current||!свечи.length)return;
                
                if(chartRef.current){
                    chartRef.current.remove();
                    chartRef.current=null;
                }
                
                const chart=createChart(refГрафика.current,{
                    layout:{
                        background:{type:ColorType.Solid,color:"transparent"},
                        textColor:"#9ca3af"
                    },
                    grid:{
                        vertLines:{color:"rgba(255,255,255,0.03)"},
                        horzLines:{color:"rgba(255,255,255,0.03)"}
                    },
                    crosshair:{
                        mode:1,
                        vertLine:{color:"rgba(0,212,170,0.5)",width:1},
                        horzLine:{color:"rgba(0,212,170,0.5)",width:1}
                    },
                    rightPriceScale:{
                        borderColor:"rgba(255,255,255,0.1)",
                        scaleMargins:{top:0.1,bottom:0.1}
                    },
                    timeScale:{
                        borderColor:"rgba(255,255,255,0.1)",
                        timeVisible:true,
                        secondsVisible:false
                    },
                    height:450
                });
                
                chartRef.current=chart;
                
                // Свечи
                const series=chart.addCandlestickSeries({
                    upColor:"#10b981",downColor:"#ef4444",
                    borderUpColor:"#10b981",borderDownColor:"#ef4444",
                    wickUpColor:"#10b981",wickDownColor:"#ef4444"
                });
                series.setData(свечи);
                
                // Уровни поддержки/сопротивления
                if(анализ?.уровни){
                    анализ.уровни.forEach(ур=>{
                        const line=chart.addLineSeries({
                            color:ур.цвет,
                            lineWidth:ур.толщина||2,
                            lineStyle:ур.стиль||0,
                            title:ур.название,
                            lastValueVisible:false
                        });
                        line.setData(свечи.map(с=>({time:с.time,value:ур.цена})));
                    });
                }
                
                // FVG зоны
                if(анализ?.fvg){
                    анализ.fvg.forEach((f,i)=>{
                        const цвет=f.тип==="бычий"?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)";
                        const верх=chart.addLineSeries({color:цвет,lineWidth:1,lineStyle:2,lastValueVisible:false});
                        const низ=chart.addLineSeries({color:цвет,lineWidth:1,lineStyle:2,lastValueVisible:false});
                        верх.setData(свечи.slice(f.индекс-2,f.индекс+10).map(с=>({time:с.time,value:f.верх})));
                        низ.setData(свечи.slice(f.индекс-2,f.индекс+10).map(с=>({time:с.time,value:f.низ})));
                    });
                }
                
                // Order Blocks
                if(анализ?.блокиОрдеров){
                    анализ.блокиОрдеров.forEach(б=>{
                        if(!б.пробит){
                            const цвет=б.тип==="бычий"?"rgba(16,185,129,0.3)":"rgba(239,68,68,0.3)";
                            const line=chart.addLineSeries({color:цвет,lineWidth:2,lastValueVisible:false});
                            line.setData(свечи.slice(б.индекс,б.индекс+15).map(с=>({time:с.time,value:б.close})));
                        }
                    });
                }
                
                // Объём
                const volumeSeries=chart.addHistogramSeries({
                    color:"#3b82f6",
                    priceFormat:{type:"volume"},
                    priceScaleId:""
                });
                volumeSeries.setData(свечи.map(с=>({time:с.time,value:с.volume,color:с.close>с.open?"rgba(16,185,129,0.5)":"rgba(239,68,68,0.5)"})));
                
                chart.timeScale().fitContent();
                
                return()=>{if(chartRef.current){chartRef.current.remove();chartRef.current=null;}};
            },[свечи,анализ]);
            
            return(
                <div style={{marginBottom:24}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                        <div style={{fontSize:12,color:"#6b7280",letterSpacing:2,fontWeight:600}}>ЦЕНОВОЙ ГРАФИК · H1 · С ИНДИКАТОРАМИ</div>
                        <div style={{display:"flex",gap:12,fontSize:11}}>
                            <span style={{color:"#10b981"}}>● FVG</span>
                            <span style={{color:"#3b82f6"}}>● ОБ</span>
                            <span style={{color:"#f59e0b"}}>● Уровни</span>
                        </div>
                    </div>
                    <div ref={refГрафика} className="glass neon-border" style={{borderRadius:16,padding:12}}/>
                </div>
            );
        }

        function МатрицаКорреляции({корреляции,выбранная}){
            const пары=Object.keys(корреляции).filter(к=>к!==выбранная.пара).slice(0,8);
            
            return(
                <div className="glass" style={{padding:24,borderRadius:16,marginBottom:24}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>

                        <div style={{fontSize:11,color:"#4b5563"}}>Период: 20</div>
                    </div>
                    
                    <div style={{display:"flex",flexDirection:"column",gap:10}}>
                        {пары.map(пара=>{
                            const знач=корреляции[пара];
                            const цвет=Math.abs(знач)>0.8?"#ef4444":Math.abs(знач)>0.5?"#f59e0b":"#10b981";
                            const ширина=Math.abs(знач)*100;
                            
                            return(
                                <div key={пара} style={{display:"flex",alignItems:"center",gap:12}}>
                                    <div style={{width:80,fontSize:12,color:"#9ca3af"}}>{пара}</div>
                                    <div style={{flex:1,height:8,background:"rgba(255,255,255,0.05)",borderRadius:4,overflow:"hidden"}}>
                                        <div style={{
                                            height:"100%",
                                            width:`${ширина}%`,
                                            background:цвет,
                                            borderRadius:4,
                                            marginLeft:знач<0?`calc(50% - ${ширина/2}%)`:"50%",
                                            transform:знач<0?`translateX(-100%)`:"none"
                                        }}/>
                                    </div>
                                    <div style={{width:50,textAlign:"right",fontSize:12,fontWeight:700,color:цвет}}>
                                        {знач>0?"+":""}{знач.toFixed(2)}

                    </div>
                    
                    <div style={{marginTop:16,display:"flex",gap:20,fontSize:10,color:"#4b5563"}}>
                        <span style={{color:"#10b981"}}>● Низкая (0-0.5)</span>
                        <span style={{color:"#f59e0b"}}>● Средняя (0.5-0.8)</span>
                        <span style={{color:"#ef4444"}}>● Высокая (0.8+)</span>

        function ЭкономическийКалендарь({текущийЧас}){
            const события=useMemo(()=>{
                return ЭКОНОМИЧЕСКИЕ_СОБЫТИЯ.map(с=>{
                    const час=parseInt(с.время);
                    const до=час>текущийЧас?час-текущийЧас:24-текущийЧас+час;
                    return{...с,часовДо:до};
                }).sort((a,b)=>a.часовДо-b.часовДо).slice(0,4);
            },[текущийЧас]);
            
            return(
                <div className="glass" style={{padding:24,borderRadius:16,marginBottom:24}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                        <div style={{fontSize:12,color:"#6b7280",letterSpacing:2}}>ЭКОНОМИЧЕСКИЙ КАЛЕНДАРЬ</div>
                        <div style={{fontSize:11,color:"#4b5563"}}>Ближайшие события</div>
                    </div>
                    
                    <div style={{display:"flex",flexDirection:"column",gap:12}}>
                        {события.map((с,i)=>{
                            const цвет=с.важность==="высокая"?"#ef4444":с.важность==="средняя"?"#f59e0b":"#10b981";
                            const критично=с.часовДо<2&&с.важность==="высокая";
                            
                            return(
                                <div key={i} style={{
                                    display:"flex",alignItems:"center",gap:16,
                                    padding:16,borderRadius:12,
                                    background:критично?"rgba(239,68,68,0.1)":"rgba(255,255,255,0.03)",
                                    border:`1px solid ${критично?"rgba(239,68,68,0.3)":"transparent"}`
                                }}>
                                    <div style={{width:60,textAlign:"center"}}>
                                        <div style={{fontSize:18,fontWeight:700,color:"#e5e7eb"}}>{с.время}</div>
                                        <div style={{fontSize:9,color:"#6b7280"}}>UTC</div>
                                    </div>
                                    <div style={{flex:1}}>
                                        <div style={{fontSize:14,color:"#e5e7eb",fontWeight:600}}>{с.название}</div>
                                        <div style={{display:"flex",gap:8,marginTop:6}}>
                                            <span style={{fontSize:10,padding:"2px 8px",background:"rgba(255,255,255,0.05)",borderRadius:4,color:"#9ca3af"}}>{с.валюта}</span>
                                            <span style={{fontSize:10,padding:"2px 8px",background:`${цвет}20`,borderRadius:4,color}}>{с.важность.toUpperCase()}</span>
                                        </div>
                                    </div>
                                    <div style={{textAlign:"right"}}>
                                        <div style={{fontSize:16,fontWeight:700,color:цвет}}>{с.часовДо}ч</div>
                                        {критично&&<div style={{fontSize:9,color:"#ef4444",marginTop:2}}>⚠ ОСТАНОВИТЬ ТОРГОВЛЮ</div>}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════════
        // ГЛАВНЫЙ КОМПОНЕНТ
        // ═══════════════════════════════════════════════════════════════════════════════
        
        function Приложение(){
            const [выбраннаяПара,setВыбраннаяПара]=useState(ВАЛЮТНЫЕ_ПАРЫ[0]);
            const [загрузка,setЗагрузка]=useState(false);
            const [данные,setДанные]=useState(null);
            const [анализ,setАнализ]=useState(null);
            const [корреляции,setКорреляции]=useState({});
            const [время,setВремя]=useState(получитьВремяМосква());
            const [дата,setДата]=useState(получитьДатуМосква());
            const [час,setЧас]=useState(получитьЧасМосква());
            
            useEffect(()=>{
                const таймер=setInterval(()=>{
                    setВремя(получитьВремяМосква());
                    setДата(получитьДатуМосква());
                    setЧас(получитьЧасМосква());
                },1000);
                return()=>clearInterval(таймер);
            },[]);
            
            useEffect(()=>{
                if(!данные?.свечи)return;
                
                // Расчёт корреляций с другими парами
                const текущиеЦены=данные.свечи.map(с=>с.close);
                const новыеКорр={};
                
                ВАЛЮТНЫЕ_ПАРЫ.forEach(п=>{
                    if(п.пара!==выбраннаяПара.пара){
                        // Симуляция корреляции на основе DXY веса
                        const базоваяКорр=1-Math.abs(п.dxyВес-выбраннаяПара.dxyВес);
                        const шум=(Math.random()-0.5)*0.3;
                        новыеКорр[п.пара]=Math.max(-1,Math.min(1,базоваяКорр+шум));
                    }
                });
                
                setКорреляции(новыеКорр);
            },[данные,выбраннаяПара]);
            
            const выполнитьАнализ=async()=>{
                setЗагрузка(true);
                
                try{
                    const данныеПары=await загрузитьДанныеПары(выбраннаяПара.пара);
                    setДанные(данныеПары);
                    
                    const свечи=данныеПары.свечи;
                    const цены=свечи.map(с=>с.close);
                    const текущаяЦена=данныеПары.цена;
                    const isJPY=выбраннаяПара.пара.includes("JPY");
                    const знаки=isJPY?3:5;
                    
                    // Технические индикаторы
                    const rsi=расчетRSI(цены);
                    const macd=расчетMACD(цены);
                    const боллинджер=расчетБоллинджера(цены);
                    const atr=свечи.slice(-14).reduce((acc,с,i,arr)=>{
                        if(i===0)return acc;
                        return acc+Math.max(с.high-с.low,Math.abs(с.high-arr[i-1].close),Math.abs(с.low-arr[i-1].close));
                    },0)/14;
                    
                    // Определение тренда
                    const ema50=цены.slice(-50).reduce((a,b)=>a+b,0)/50;
                    const ema200=цены.slice(-200).reduce((a,b)=>a+b,0)/200;
                    const тренд=текущаяЦена>ema50&&ema50>ema200?"восходящий":текущаяЦена<ema50&&ema50<ema200?"нисходящий":"боковой";
                    const силаТренда=Math.min(100,Math.round(Math.abs(текущаяЦена-ema200)/ema200*5000));
                    const цветТренда=тренд==="восходящий"?"#10b981":тренд==="нисходящий"?"#ef4444":"#9ca3af";
                    
                    // Уровни
                    const макс20=Math.max(...свечи.slice(-20).map(с=>с.high));
                    const мин20=Math.min(...свечи.slice(-20).map(с=>с.low));
                    const диапазон=макс20-мин20;
                    const середина=(макс20+мин20)/2;
                    
                    // Premium/Discount
                    const позиция=(текущаяЦена-мин20)/диапазон;
                    const зона=позиция>0.8?"премиум":позиция<0.2?"дискаунт":"равновесие";
                    
                    // ICT элементы
                    const fvg=поискFVG(свечи);
                    const блокиОрдеров=поискОБ(свечи);
                    const фазаВайкоффа=определитьФазуВайкоффа(свечи,текущаяЦена);
                    const дисбаланс=расчетДисбаланса(свечи);
                    const профиль=генерацияПрофиляОбъема(свечи);
                    
                    // Сетапы
                    const сетапПокупка=(зона==="дискаунт"||зона==="равновесие")?{
                        валиден:true,
                        зонаВхода:`${мин20.toFixed(знаки)}-${(мин20+atr*0.5).toFixed(знаки)}`,
                        стопЛосс:(мин20-atr*1.5).toFixed(знаки),
                        тп1:(текущаяЦена+atr*2.5).toFixed(знаки),
                        тп2:(текущаяЦена+atr*4).toFixed(знаки),
                        рр1:2.5,рр2:4.0,
                        логика:`Цена в зоне дискаунта (${(позиция*100).toFixed(0)}%). Конфлюэнс с ${блокиОрдеров.find(б=>б.тип==="бычий"&&!б.пробит)?"Order Block":"FVG 50% CE"}.`,
                        концепция:блокиОрдеров.find(б=>б.тип==="бычий"&&!б.пробит)?"Order Block + FVG":"FVG Consequent Encroachment",
                        блокОрдеров:блокиОрдеров.find(б=>б.тип==="бычий"&&!б.пробит),
                        fvg:fvg.find(f=>f.тип==="бычий"),
                        atr:atr.toFixed(isJPY?2:4),
                        времяСделки:"Лондон/Нью-Йорк Kill Zone"
                    }:null;
                    
                    const сетапПродажа=(зона==="премиум"||зона==="равновесие")?{
                        валиден:true,
                        зонаВхода:`${(макс20-atr*0.5).toFixed(знаки)}-${макс20.toFixed(знаки)}`,
                        стопЛосс:(макс20+atr*1.5).toFixed(знаки),
                        тп1:(текущаяЦена-atr*2.5).toFixed(знаки),
                        тп2:(текущаяЦена-atr*4).toFixed(знаки),
                        рр1:2.5,рр2:4.0,
                        логика:`Цена в зоне премиума (${(позиция*100).toFixed(0)}%). Конфлюэнс с ${блокиОрдеров.find(б=>б.тип==="медвежий"&&!б.пробит)?"Order Block":"FVG 50% CE"}.`,
                        концепция:блокиОрдеров.find(б=>б.тип==="медвежий"&&!б.пробит)?"Order Block + FVG":"FVG Consequent Encroachment",
                        блокОрдеров:блокиОрдеров.find(б=>б.тип==="медвежий"&&!б.пробит),
                        fvg:fvg.find(f=>f.тип==="медвежий"),
                        atr:atr.toFixed(isJPY?2:4),
                        времяСделки:"Лондон/Нью-Йорк Kill Zone"
                    }:null;
                    
                    // Приоритет
                    let приоритет=null;
                    if(сетапПокупка?.валиден&&сетапПродажа?.валиден){
                        приоритет=зона==="дискаунт"?"покупка":зона==="премиум"?"продажа":null;
                    }else if(сетапПокупка?.валиден){
                        приоритет="покупка";
                    }else if(сетапПродажа?.валиден){
                        приоритет="продажа";
                    }
                    
                    setАнализ({
                        тренд,силаТренда,цветТренда,rsi,macd,atr:atr.toFixed(isJPY?2:4),
                        зона,позиция,
                        уровни:[
                            {цена:макс20,название:"Сопротивление 20",цвет:"#ef4444",толщина:2,стиль:2},
                            {цена:боллинджер.верх,название:"BB Верх",цвет:"#f59e0b",толщина:1,стиль:3},
                            {цена:середина,название:"Средняя линия",цвет:"#9ca3af",толщина:1,стиль:3},
                            {цена:боллинджер.низ,название:"BB Низ",цвет:"#f59e0b",толщина:1,стиль:3},
                            {цена:мин20,название:"Поддержка 20",цвет:"#10b981",толщина:2,стиль:2},
                            {цена:профиль.poc,название:"POC",цвет:"#8b5cf6",толщина:2,стиль:0}
                        ],
                        fvg,блокиОрдеров,фазаВайкоффа,дисбаланс,профиль,
                        сетапПокупка,сетапПродажа,приоритет
                    });
                    
                }finally{
                    setЗагрузка(false);
                }
            };
            
            const активнаяСессия=КИЛЛ_ЗОНЫ.find(с=>час>=с.начало&&час<с.конец)||null;
            
            return(
                <div style={{minHeight:"100vh",background:"linear-gradient(180deg,#0a0c10 0%,#111827 100%)"}}>
                    <Шапка время={время} дата={дата} сессия={активнаяСессия}/>
                    
                    <div style={{maxWidth:"1600px",margin:"0 auto",padding:"28px"}}>
                        <ПанельСессий текущийЧас={час}/>
                        
                        <СелекторПары 
                            пары={ВАЛЮТНЫЕ_ПАРЫ} 
                            выбранная={выбраннаяПара} 
                            наВыбор={setВыбраннаяПара}
                            корреляции={корреляции}
                        />
                        
                        {загрузка&&(
                            <div style={{textAlign:"center",padding:"80px 20px"}}>
                                <div style={{position:"relative",width:80,height:80,margin:"0 auto 30px"}}>
                                    <div style={{position:"absolute",inset:0,border:"4px solid rgba(0,212,170,0.1)",borderRadius:"50%"}}/>
                                    <div style={{position:"absolute",inset:0,border:"4px solid transparent",borderTopColor:"#00d4aa",borderRadius:"50%",animation:"rotate 1s linear infinite"}}/>
                                    <div style={{position:"absolute",inset:12,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>◈</div>
                                </div>
                                <div style={{fontSize:18,color:"#00d4aa",letterSpacing:3,fontWeight:700,marginBottom:16}}>
                                    ИНСТИТУЦИОНАЛЬНЫЙ АНАЛИЗ
                                </div>
                                <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                                    {["Wyckoff Phases","Order Blocks","Fair Value Gaps","Volume Profile","Order Flow","Market Structure"].map((т,i)=>(
                                        <div key={т} style={{
                                            padding:"10px 20px",
                                            background:`rgba(0,212,170,${0.1+i*0.02})`,
                                            borderRadius:20,
                                            fontSize:12,
                                            color:"#00d4aa",
                                            animation:`slideIn ${0.3+i*0.1}s ease`
                                        }}>{т}</div>
                                    ))}
                                </div>
                            </div>
                        )}
                        
                        {данные&&!загрузка&&(
                            <>
                                <div className="glass neon-border" style={{padding:24,borderRadius:16,marginBottom:24,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                    <div>
                                        <div style={{fontSize:42,fontWeight:800,color:"#fff",letterSpacing:"-1px"}}>
                                            {данные.цена.toFixed(выбраннаяПара.пара.includes("JPY")?3:5)}
                                        </div>
                                        <div style={{fontSize:13,color:"#6b7280",marginTop:4}}>
                                            {выбраннаяПара.пара} · {данные.источник} · Обновлено: {new Date(данные.время).toLocaleTimeString("ru-RU")}
                                        </div>
                                    </div>
                                    <div style={{textAlign:"right"}}>
                                        <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end",marginBottom:8}}>
                                            <div style={{width:8,height:8,borderRadius:"50%",background:"#10b981"}}/>
                                            <span style={{fontSize:14,color:"#10b981",fontWeight:700}}>ДАННЫЕ АКТУАЛЬНЫ</span>
                                        </div>
                                        <div style={{fontSize:12,color:"#4b5563"}}>DXY: {данные.dxy?.toFixed(2)||"N/A"}</div>
                                        {данные.демо&&<div style={{fontSize:11,color:"#f59e0b",marginTop:4}}>⚠ Демо-режим</div>}
                                    </div>
                                </div>
                                
                                <ГрафикСИндикаторами свечи={данные.свечи} анализ={анализ} выбраннаяПара={выбраннаяПара}/>
                                
                                <ПанельТехническогоАнализа анализ={анализ}/>
                                
                                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
                                    <div>
                                        <ПанельВайкоффа фаза={анализ?.фазаВайкоффа}/>
                                        <ПанельДисбаланса дисбаланс={анализ?.дисбаланс}/>
                                        <МатрицаКорреляции корреляции={корреляции} выбранная={выбраннаяПара}/>
                                    </div>
                                    <div>
                                        <ЭкономическийКалендарь текущийЧас={час}/>
                                    </div>
                                </div>
                                
                                <div style={{marginTop:24,display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:24}}>
                                    <КарточкаСетапа 
                                        сетап={анализ?.сетапПокупка} 
                                        тип="покупка" 
                                        уверенность={анализ?.приоритет==="покупка"?90:анализ?.сетапПокупка?65:0}
                                        приоритет={анализ?.приоритет==="покупка"}
                                        профиль={анализ?.профиль}
                                    />
                                    <КарточкаСетапа 
                                        сетап={анализ?.сетапПродажа} 
                                        тип="продажа" 
                                        уверенность={анализ?.приоритет==="продажа"?90:анализ?.сетапПродажа?65:0}
                                        приоритет={анализ?.приоритет==="продажа"}
                                        профиль={анализ?.профиль}
                                    />
                                </div>
                                
                                {анализ?.приоритет===null&&(
                                    <div className="glass" style={{padding:40,borderRadius:20,textAlign:"center",border:"2px solid rgba(245,158,11,0.3)",marginTop:24}}>
                                        <div style={{fontSize:56,marginBottom:16}}>⚠️</div>
                                        <div style={{fontSize:22,fontWeight:800,color:"#f59e0b",marginBottom:8}}>НЕТ КАЧЕСТВЕННОГО СЕТАПА</div>
                                        <div style={{fontSize:14,color:"#9ca3af",lineHeight:1.8,maxWidth:600,margin:"0 auto"}}>
                                            Текущие рыночные условия не соответствуют критериям ICT/SMC.<br/>
                                            Ожидайте входа цены в Premium/Discount зоны или формирования чёткой структуры.
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                        
                        {!данные&&!загрузка&&(
                            <div style={{textAlign:"center",padding:"120px 20px"}}>
                                <div style={{fontSize:80,marginBottom:24,opacity:0.2}}>◈</div>
                                <div style={{fontSize:24,color:"#6b7280",letterSpacing:3,marginBottom:16,fontWeight:700}}>ГОТОВ К АНАЛИЗУ</div>
                                <div style={{fontSize:15,color:"#9ca3af",lineHeight:2,maxWidth:700,margin:"0 auto"}}>
                                    Выберите валютную пару и запустите <span style={{color:"#00d4aa",fontWeight:600}}>ИНСТИТУЦИОНАЛЬНЫЙ АНАЛИЗ</span><br/>
                                    Получите полную картину рынка: Wyckoff фазы, Order Blocks, FVG,<br/>
                                    Volume Profile, Order Flow и готовые торговые сетапы с точками входа.
                                </div>
                            </div>
                        )}
                    </div>
                    
                    {/* Фиксированная кнопка */}
                    <div style={{
                        position:"fixed",bottom:0,left:0,right:0,
                        background:"rgba(10,12,16,0.95)",backdropFilter:"blur(20px)",
                        borderTop:"1px solid rgba(255,255,255,0.08)",padding:"24px 28px 32px",
                        zIndex:1000
                    }}>
                        <div style={{maxWidth:"1600px",margin:"0 auto"}}>
                            <button 
                                onClick={выполнитьАнализ}
                                disabled={загрузка}
                                style={{
                                    width:"100%",height:72,
                                    background:загрузка?"rgba(0,212,170,0.1)":"linear-gradient(135deg,#00d4aa,#00a8e8)",
                                    border:"none",borderRadius:16,
                                    color:загрузка?"rgba(0,212,170,0.4)":"#fff",
                                    fontSize:20,fontWeight:800,letterSpacing:2,
                                    cursor:загрузка?"not-allowed":"pointer",
                                    boxShadow:загрузка?"none":"0 12px 40px rgba(0,212,170,0.3)",
                                    transition:"all 0.3s ease",
                                    display:"flex",alignItems:"center",justifyContent:"center",gap:16
                                }}
                            >
                                {загрузка?(
                                    <>АНАЛИЗ<span className="killzone-pulse">...</span></>
                                ):(
                                    <>🔬 ЗАПУСТИТЬ ИНСТИТУЦИОНАЛЬНЫЙ АНАЛИЗ</>
                                )}
                            </button>
                            <div style={{textAlign:"center",marginTop:16,fontSize:12,color:"#4b5563",letterSpacing:1}}>
                                Smart Money Concepts · Inner Circle Trader · Wyckoff Method · Volume Profile
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<Приложение/>);
    </script>
</body>
</html>
