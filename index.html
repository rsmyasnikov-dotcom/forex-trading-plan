                                </div>

                                {data.recommendation.action === 'NO_TRADE' ? (
                                    <div className="flex items-center gap-4 p-4 rounded-xl bg-slate-950/50 border border-slate-800">
                                        <AlertTriangle className="w-8 h-8 text-amber-400" />
                                        <div>
                                            <div className="font-semibold text-amber-400">No Trade Setup</div>
                                            <div className="text-sm text-slate-400">
                                                D1 bearish but H4 consolidating. Insufficient RR ratio for entry.
                                                Waiting for better setup at key resistance level.
                                            </div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                        <div className="bg-slate-950/50 rounded-xl p-4 border border-slate-800">
                                            <div className="text-xs text-slate-400 mb-1">Entry (Limit)</div>
                                            <div className="text-xl font-mono font-bold text-blue-400">
                                                {formatNumber(data.recommendation.entry)}
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/50 rounded-xl p-4 border border-slate-800">
                                            <div className="text-xs text-slate-400 mb-1">Stop Loss</div>
                                            <div className="text-xl font-mono font-bold text-rose-400">
                                                {formatNumber(data.recommendation.stopLoss)}
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/50 rounded-xl p-4 border border-slate-800">
                                            <div className="text-xs text-slate-400 mb-1">TP1</div>
                                            <div className="text-xl font-mono font-bold text-emerald-400">
                                                {formatNumber(data.recommendation.tp1)}
                                            </div>
                                        </div>
                                        <div className="bg-slate-950/50 rounded-xl p-4 border border-slate-800">
                                            <div className="text-xs text-slate-400 mb-1">TP2</div>
                                            <div className="text-xl font-mono font-bold text-emerald-400">
                                                {formatNumber(data.recommendation.tp2)}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>

                            <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                                <h3 className="text-lg font-semibold mb-4">Price Action (H1)</h3>
                                <div className="h-64">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <LineChart data={data.chartData}>
                                            <XAxis dataKey="date" hide />
                                            <YAxis domain={['dataMin - 0.005', 'dataMax + 0.005']} tickFormatter={(val) => val.toFixed(4)} tick={{fill: '#64748b', fontSize: 10}} />
                                            <Tooltip contentStyle={{ backgroundColor: '#0f172a', border: '1px solid #1e293b', borderRadius: '8px' }} formatter={(value) => [Number(value).toFixed(5), 'Price']} />
                                            <ReferenceLine y={data.levels.nearestResistance} stroke="#f43f5e" strokeDasharray="3 3" label={{ value: 'Resistance', fill: '#f43f5e', fontSize: 10, position: 'right' }} />
                                            <ReferenceLine y={data.levels.nearestSupport} stroke="#10b981" strokeDasharray="3 3" label={{ value: 'Support', fill: '#10b981', fontSize: 10, position: 'right' }} />
                                            <Line type="monotone" dataKey="close" stroke="#3b82f6" strokeWidth={2} dot={false} />
                                        </LineChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>

                            <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                                <h3 className="text-lg font-semibold mb-4">Key Levels</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <div className="text-sm text-slate-400 mb-2">Support Zones</div>
                                        {data.levels.support.map((level, i) => (
                                            <div key={i} className="flex items-center gap-2 text-emerald-400">
                                                <TrendingDown className="w-4 h-4" />
                                                <span className="font-mono">{Number(level).toFixed(5)}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <div>
                                        <div className="text-sm text-slate-400 mb-2">Resistance Zones</div>
                                        {data.levels.resistance.map((level, i) => (
                                            <div key={i} className="flex items-center gap-2 text-rose-400">
                                                <TrendingUp className="w-4 h-4" />
                                                <span className="font-mono">{Number(level).toFixed(5)}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="mt-8 pt-6 border-t border-slate-800 text-center text-xs text-slate-500">
                        <p>Forex Trading Plan • Conservative Day Trading Strategy • D1/H4/H1 Analysis</p>
                        <p className="mt-1">Risk Warning: Trading involves substantial risk of loss.</p>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<ForexTradingPlan />);
    </script>
</body>
</html>
