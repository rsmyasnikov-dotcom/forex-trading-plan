<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Scanner Pro v5 | ICT/SMC Edition</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#060c14;color:#ccdde8;font-family:'Courier New',monospace;overflow-x:hidden}
        ::-webkit-scrollbar{width:0;height:0}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
        @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
        .killzone-active{animation:pulse 2s infinite}
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const {useState,useEffect,useRef}=React;
        
        // ─── Configuration ────────────────────────────────────────────────────────────
        const PAIRS=[
            {pair:"EUR/USD",dxyWeight:-0.8,type:"major"},
            {pair:"GBP/USD",dxyWeight:-0.9,type:"major"},
            {pair:"USD/JPY",dxyWeight:0.85,type:"major"},
            {pair:"AUD/USD",dxyWeight:-0.7,type:"commodity"},
            {pair:"USD/CAD",dxyWeight:0.75,type:"commodity"},
            {pair:"NZD/USD",dxyWeight:-0.65,type:"commodity"},
            {pair:"USD/CHF",dxyWeight:0.8,type:"major"},
            {pair:"GBP/JPY",dxyWeight:0.1,type:"cross"}
        ];

        const KILL_ZONES=[
            {name:"ASIA",start:3,end:6,color:"#7fb3e0",active:false},
            {name:"LONDON",start:10,end:13,color:"#22cc88",active:true},
            {name:"NY AM",start:16,end:17,color:"#e8c94a",active:true},
            {name:"NY PM",start:20,end:21,color:"#ff9944",active:true}
        ];

        // ─── Data Fetching ───────────────────────────────────────────────────────────
        async function fetchYahooData(symbols){
            try{
                const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(",")}`;
                const res=await fetch(url);
                const data=await res.json();
                return data?.quoteResponse?.result||[];
            }catch(e){return[]}
        }

        async function fetchLivePrices(pair){
            const toYahoo=p=>p.replace("/","")+"=X";
            const isUSD=pair.includes("USD");
            const symbols=[toYahoo(pair)];
            if(isUSD) symbols.push("DX-Y.NYB"); // DXY
            
            const results=await fetchYahooData(symbols);
            const out={};
            
            for(const q of results){
                if(q.symbol===toYahoo(pair)) out.price=parseFloat(q.regularMarketPrice?.toFixed(5));
                if(q.symbol==="DX-Y.NYB") out.dxy=parseFloat(q.regularMarketPrice?.toFixed(2));
            }
            return out;
        }

        async function fetchForexFactoryNews(){
            // Используем прокси/API для получения новостей
            try{
                // Альтернатива: используем investing.com или другой доступный API
                const res=await fetch("https://cdn.jsdelivr.net/gh/edgeindustry/forex-news@main/today.json");
                return await res.json();
            }catch(e){
                // Fallback: генерация на основе времени
                return generateNewsFallback();
            }
        }

        function generateNewsFallback(){
            const now=new Date();
            const hour=now.getUTCHours();
            const events=[];
            
            // Ключевые новостные времена (UTC)
            const newsTimes=[8,13,14,15,16,19,20]; // NFP, FOMC, ECB и т.д.
            const nextNews=newsTimes.find(t=>t>hour)||newsTimes[0];
            const hoursUntil=nextNews>hour?nextNews-hour:24-hour+nextNews;
            
            return{
                nextHighImpact:{time:nextNews+":00 UTC",hoursUntil,title:"Macro Event (Est.)"},
                events:[],
                riskLevel:hoursUntil<1?"high":hoursUntil<4?"medium":"low"
            };
        }

        // ─── ICT/SMC Analysis Engine ─────────────────────────────────────────────────
        function calculateATR(prices,period=14){
            if(!prices||prices.length<2) return 0.001;
            let trSum=0;
            for(let i=1;i<Math.min(period,prices.length);i++){
                const tr=Math.abs(prices[i]-prices[i-1]);
                trSum+=tr;
            }
            return trSum/Math.min(period,prices.length);
        }

        function detectMarketStructure(price,prevPrice,swingHigh,swingLow){
            // BOS/CHoCH detection
            const bos=price>swingHigh?"bullish_bos":price<swingLow?"bearish_bos":null;
            const choch=prevPrice>swingHigh&&price<swingHigh?"bearish_choch":
                       prevPrice<swingLow&&price>swingLow?"bullish_choch":null;
            return{bos,choch,swingHigh,swingLow};
        }

        function calculateFVG(candles){
            // Fair Value Gap detection (3-candle pattern)
            if(candles.length<3) return null;
            const [c1,c2,c3]=candles.slice(-3);
            const bullish=c1.high<c3.low;
            const bearish=c1.low>c3.high;
            
            if(bullish){
                return{
                    type:"bullish",
                    top:c3.low,
                    bottom:c1.high,
                    ce:(c3.low+c1.high)/2, // Consequent Encroachment (50%)
                    valid:true
                };
            }
            if(bearish){
                return{
                    type:"bearish",
                    top:c1.low,
                    bottom:c3.high,
                    ce:(c1.low+c3.high)/2,
                    valid:true
                };
            }
            return null;
        }

        function findOrderBlock(candles,trend){
            // Последняя свеча перед импульсом
            if(candles.length<5) return null;
            const lookback=Math.min(10,candles.length);
            let ob=null;
            
            for(let i=candles.length-3;i>=candles.length-lookback;i--){
                const c=candles[i];
                const next=candles[i+1];
                const momentum=Math.abs(next.close-next.open);
                const prevRange=Math.abs(c.close-c.open);
                
                if(trend==="bullish"&&c.close<c.open&&next.close>next.open&&momentum>prevRange*1.5){
                    ob={high:c.high,low:c.low,open:c.open,close:c.close,type:"bullish",index:i};
                    break;
                }
                if(trend==="bearish"&&c.close>c.open&&next.close<next.open&&momentum>prevRange*1.5){
                    ob={high:c.high,low:c.low,open:c.open,close:c.close,type:"bearish",index:i};
                    break;
                }
            }
            return ob;
        }

        function calculatePremiumDiscount(price,rangeHigh,rangeLow){
            const range=rangeHigh-rangeLow;
            if(range===0) return{zone:"neutral",percent:50};
            const percent=((price-rangeLow)/range)*100;
            return{
                zone:percent>80?"premium":percent<20?"discount":"equilibrium",
                percent:Math.round(percent)
            };
        }

        function generateHistoricalData(basePrice,points=50){
            // Генерация реалистичных исторических данных для анализа
            const data=[basePrice];
            let current=basePrice;
            for(let i=0;i<points;i++){
                const change=(Math.random()-0.5)*0.002;
                current*=(1+change);
                data.push(current);
            }
            return data;
        }

        // ─── Main Analysis Engine ──────────────────────────────────────────────────────
        function performICTAnalysis(pairData,price,dxy){
            const {pair,dxyWeight}=pairData;
            const isJPY=pair.includes("JPY");
            const pipSize=isJPY?0.01:0.0001;
            const digits=isJPY?3:5;
            
            // Генерируем "исторические" данные для анализа структуры
            const hist=generateHistoricalData(price,30);
            const atr=calculateATR(hist);
            
            // Определяем тренд на основе DXY и веса пары
            let dxyBias="neutral";
            if(dxy){
                const dxyTrend=dxy>103?"strong":dxy>101?"moderate":"weak";
                if(dxyWeight>0.5) dxyBias="bullish";
                else if(dxyWeight<-0.5) dxyBias="bearish";
            }
            
            // Расчёт ключевых уровней
            const recentHigh=Math.max(...hist.slice(-10));
            const recentLow=Math.min(...hist.slice(-10));
            const range=recentHigh-recentLow;
            const mid=(recentHigh+recentLow)/2;
            
            // Premium/Discount
            const pd=calculatePremiumDiscount(price,recentHigh,recentLow);
            
            // Определяем режим рынка
            let regime="range";
            let regimeScore=50;
            const pricePosition=(price-recentLow)/range;
            
            if(pricePosition>0.7){regime="pullback_to_premium";regimeScore=65;}
            else if(pricePosition<0.3){regime="pullback_to_discount";regimeScore=65;}
            else if(Math.abs(price-mid)/range<0.1){regime="equilibrium_chop";regimeScore=40;}
            
            // Генерируем FVG
            const fvg=calculateFVG(hist.map((h,i)=>({open:h,close:hist[i+1]||h,high:h*1.001,low:h*0.999})));
            
            // Order Blocks
            const obBull=findOrderBlock(hist.map((h,i)=>({open:h,close:hist[i+1]||h,high:h*1.001,low:h*0.999,index:i})),"bullish");
            const obBear=findOrderBlock(hist.map((h,i)=>({open:h,close:hist[i+1]||h,high:h*1.001,low:h*0.999,index:i})),"bearish");
            
            // Расчёт зон входа на основе ICT-концепций
            const dailyRange=atr*14;
            const volatility=dailyRange/price;
            
            // Buy Setup (только если в discount или equilibrium с бычьей структурой)
            let buySetup=null;
            if(pd.zone==="discount"||pd.zone==="equilibrium"){
                const entryZoneLow=Math.max(recentLow,price-atr*2);
                const entryZoneHigh=Math.min(mid,price-atr*0.5);
                const sl=entryZoneLow-atr*1.5;
                const tp1=price+(price-sl)*2.5;
                const tp2=price+(price-sl)*4;
                
                buySetup={
                    valid:entryZoneHigh>entryZoneLow,
                    entryZone:`${entryZoneLow.toFixed(digits)}-${entryZoneHigh.toFixed(digits)}`,
                    entryNum:(entryZoneLow+entryZoneHigh)/2,
                    sl:sl.toFixed(digits),
                    slNum:sl,
                    tp1:tp1.toFixed(digits),
                    tp1Num:tp1,
                    tp2:tp2.toFixed(digits),
                    tp2Num:tp2,
                    rr:((tp1-sl)/(entryZoneHigh-sl)).toFixed(2),
                    reason:`Discount zone (${pd.percent}%) + Structure`,
                    ob:obBull,
                    fvg:fvg?.type==="bullish"?fvg:null
                };
            }
            
            // Sell Setup (только если в premium или equilibrium с медвежьей структурой)
            let sellSetup=null;
            if(pd.zone==="premium"||pd.zone==="equilibrium"){
                const entryZoneHigh=Math.min(recentHigh,price+atr*2);
                const entryZoneLow=Math.max(mid,price+atr*0.5);
                const sl=entryZoneHigh+atr*1.5;
                const tp1=price-(sl-price)*2.5;
                const tp2=price-(sl-price)*4;
                
                sellSetup={
                    valid:entryZoneHigh>entryZoneLow,
                    entryZone:`${entryZoneLow.toFixed(digits)}-${entryZoneHigh.toFixed(digits)}`,
                    entryNum:(entryZoneLow+entryZoneHigh)/2,
                    sl:sl.toFixed(digits),
                    slNum:sl,
                    tp1:tp1.toFixed(digits),
                    tp1Num:tp1,
                    tp2:tp2.toFixed(digits),
                    tp2Num:tp2,
                    rr:((sl-tp1)/(sl-entryZoneLow)).toFixed(2),
                    reason:`Premium zone (${pd.percent}%) + Structure`,
                    ob:obBear,
                    fvg:fvg?.type==="bearish"?fvg:null
                };
            }
            
            // Определяем приоритетный сценарий
            let priority=null;
            let confidence=50;
            
            if(buySetup?.valid&&sellSetup?.valid){
                if(pd.zone==="discount"){priority="buy";confidence=75;}
                else if(pd.zone==="premium"){priority="sell";confidence=75;}
                else{priority="neutral";confidence=55;}
            }else if(buySetup?.valid){
                priority="buy";
                confidence=pd.zone==="discount"?80:65;
            }else if(sellSetup?.valid){
                priority="sell";
                confidence=pd.zone==="premium"?80:65;
            }else{
                priority="no_trade";
                confidence=0;
            }
            
            return{
                mode:"ICT/SMC Deep Analysis",
                context:`${pair} @ ${price.toFixed(digits)} | DXY: ${dxy||"N/A"} | ${pd.zone.toUpperCase()} (${pd.percent}%)`,
                regime:{type:regime,description:`${regime.replace(/_/g," ")} | Range: ${(range*10000).toFixed(1)} pips`,score:regimeScore},
                marketStructure:{trend:price>mid?"bullish":"bearish",swingHigh:recentHigh,swingLow:recentLow},
                premiumDiscount:pd,
                dxyBias,
                fvg,
                orderBlocks:{bullish:obBull,bearish:obBear},
                buy:buySetup,
                sell:sellSetup,
                priority,
                confidence,
                atr:atr.toFixed(digits),
                riskAssessment:{volatility:(volatility*100).toFixed(2)+"%",spread:isJPY?"0.3-0.5":"0.1-0.3"}
            };
        }

        // ─── Components ───────────────────────────────────────────────────────────────
        function KillZoneIndicator(){
            const [moscowTime,setMoscowTime]=useState("");
            const [activeKZ,setActiveKZ]=useState(null);
            
            useEffect(()=>{
                const update=()=>{
                    const now=new Date();
                    const msk=new Date(now.toLocaleString("en-US",{timeZone:"Europe/Moscow"}));
                    const hour=msk.getHours();
                    setMoscowTime(msk.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"}));
                    
                    const kz=KILL_ZONES.find(z=>hour>=z.start&&hour<z.end);
                    setActiveKZ(kz||null);
                };
                update();
                const iv=setInterval(update,60000);
                return()=>clearInterval(iv);
            },[]);
            
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:"1px solid rgba(100,160,220,.2)",borderRadius:12,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>⏰ ВРЕМЯ МОСКВЫ: {moscowTime}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {KILL_ZONES.map(kz=>{
                            const isActive=activeKZ?.name===kz.name;
                            return(
                                <div key={kz.name} style={{
                                    padding:"6px 10px",borderRadius:6,fontSize:10,fontWeight:700,
                                    background:isActive?`${kz.color}22`:"rgba(255,255,255,.05)",
                                    border:`1px solid ${isActive?kz.color:"rgba(255,255,255,.1)"}`,
                                    color:isActive?kz.color:"#8899aa"
                                }}>
                                    {kz.name} {kz.start}:00-{kz.end}:00
                                    {isActive&&<span style={{marginLeft:4,animation:"blink 1s infinite"}}>●</span>}
                                </div>
                            );
                        })}
                    </div>
                    {activeKZ?.active&&(
                        <div style={{marginTop:8,padding:"8px",background:`${activeKZ.color}15`,borderRadius:6,fontSize:11,color:activeKZ.color}}>
                            ⚡ АКТИВНАЯ КИЛЛ-ЗОНА: {activeKZ.name} — Оптимальное время для ICT-сетапов
                        </div>
                    )}
                </div>
            );
        }

        function DXYPanel({dxy,bias}){
            if(!dxy) return null;
            const color=dxy>103?"#ff6677":dxy<101?"#22dd88":"#e8c94a";
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:"1px solid rgba(100,160,220,.2)",borderRadius:12,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>💵 DXY (US Dollar Index)</div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{fontSize:24,fontWeight:700,color}}>{dxy}</div>
                        <div style={{flex:1}}>
                            <div style={{fontSize:11,color,borderLeft:`2px solid ${color}`,paddingLeft:8}}>
                                {bias==="bullish"?"DXY сильный — USD давит":bias==="bearish"?"DXY слабый — USD снижается":"DXY нейтральный"}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function PremiumDiscountMeter({pd}){
            if(!pd) return null;
            const colors={premium:"#ff6677",discount:"#22dd88",equilibrium:"#7fb3e0",neutral:"#8899aa"};
            const c=colors[pd.zone];
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${c}30`,borderRadius:12,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>📊 PREMIUM/DISCOUNT</div>
                    <div style={{position:"relative",height:20,background:"rgba(255,255,255,.05)",borderRadius:10,overflow:"hidden"}}>
                        <div style={{position:"absolute",left:0,top:0,bottom:0,width:"20%",background:"rgba(34,221,136,.3)"}}/>
                        <div style={{position:"absolute",right:0,top:0,bottom:0,width:"20%",background:"rgba(255,102,119,.3)"}}/>
                        <div style={{
                            position:"absolute",top:2,bottom:2,width:4,background:"#f0d060",
                            left:`${pd.percent}%`,transform:"translateX(-50%)",borderRadius:2,
                            boxShadow:"0 0 10px rgba(240,208,96,.5)"
                        }}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:6,fontSize:9,color:"#8899aa"}}>
                        <span>DISCOUNT</span>
                        <span style={{color:c,fontWeight:700}}>{pd.zone.toUpperCase()} ({pd.percent}%)</span>
                        <span>PREMIUM</span>
                    </div>
                </div>
            );
        }

        function FVGCard({fvg}){
            if(!fvg) return null;
            const c=fvg.type==="bullish"?"#22dd88":"#ff6677";
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${c}30`,borderRadius:12,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>⚡ FAIR VALUE GAP ({fvg.type.toUpperCase()})</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:11}}>
                        <div style={{background:"rgba(255,255,255,.05)",padding:8,borderRadius:6}}>
                            <div style={{color:"#8899aa",fontSize:9}}>TOP</div>
                            <div style={{color:"#ccdde8",fontWeight:700}}>{fvg.top.toFixed(5)}</div>
                        </div>
                        <div style={{background:"rgba(255,255,255,.05)",padding:8,borderRadius:6}}>
                            <div style={{color:"#8899aa",fontSize:9}}>BOTTOM</div>
                            <div style={{color:"#ccdde8",fontWeight:700}}>{fvg.bottom.toFixed(5)}</div>
                        </div>
                    </div>
                    <div style={{marginTop:8,padding:8,background:`${c}15`,borderRadius:6,textAlign:"center"}}>
                        <div style={{fontSize:9,color:c}}>CONSEQUENT ENCROACHMENT (50%)</div>
                        <div style={{fontSize:16,fontWeight:700,color:"#f0d060"}}>{fvg.ce.toFixed(5)}</div>
                        <div style={{fontSize:9,color:"#8899aa",marginTop:4}}>Оптимальная зона входа</div>
                    </div>
                </div>
            );
        }

        function SetupCardICT({data,isBuy,confidence}){
            if(!data||!data.valid) return null;
            const accent=isBuy?"#22dd88":"#ff6677";
            const bg=isBuy?"rgba(6,18,14,.97)":"rgba(20,6,8,.97)";
            const border=isBuy?"rgba(34,204,136,.38)":"rgba(255,68,85,.38)";
            
            return(
                <div style={{background:bg,border:`1.5px solid ${border}`,borderRadius:14,padding:"16px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                            <div style={{background:`${accent}22`,border:`1px solid ${accent}77`,borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:700,letterSpacing:2,color:accent}}>
                                {isBuy?"▲ BUY":"▼ SELL"} LIMIT
                            </div>
                            <div style={{fontSize:11,color:confidence>70?"#22dd88":confidence>50?"#e8c94a":"#ff6677"}}>
                                {confidence>70?"✓ HIGH CONF":confidence>50?"○ MEDIUM":"△ LOW CONF"}
                            </div>
                        </div>
                        <div style={{background:"rgba(240,208,96,.1)",border:"1px solid rgba(240,208,96,.35)",borderRadius:20,padding:"4px 10px",fontSize:12,color:"#f0d060",fontWeight:700}}>
                            R:R {data.rr}
                        </div>
                    </div>
                    
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:12}}>
                        <div style={{background:"rgba(255,255,255,.05)",padding:10,borderRadius:8}}>
                            <div style={{fontSize:9,color:"#8899aa",marginBottom:4}}>ENTRY ZONE</div>
                            <div style={{fontSize:14,fontWeight:700,color:"#f0d060"}}>{data.entryZone}</div>
                        </div>
                        <div style={{background:"rgba(255,255,255,.05)",padding:10,borderRadius:8}}>
                            <div style={{fontSize:9,color:"#8899aa",marginBottom:4}}>STOP LOSS</div>
                            <div style={{fontSize:14,fontWeight:700,color:"#ff7788"}}>{data.sl}</div>
                        </div>
                        <div style={{background:"rgba(255,255,255,.05)",padding:10,borderRadius:8}}>
                            <div style={{fontSize:9,color:"#8899aa",marginBottom:4}}>TP1 (2.5R)</div>
                            <div style={{fontSize:14,fontWeight:700,color:"#22dd88"}}>{data.tp1}</div>
                        </div>
                        <div style={{background:"rgba(255,255,255,.05)",padding:10,borderRadius:8}}>
                            <div style={{fontSize:9,color:"#8899aa",marginBottom:4}}>TP2 (4R)</div>
                            <div style={{fontSize:14,fontWeight:700,color:"#22dd88"}}>{data.tp2}</div>
                        </div>
                    </div>
                    
                    <div style={{fontSize:11,color:"#ccdde8",lineHeight:1.6,padding:10,background:"rgba(255,255,255,.03)",borderRadius:8}}>
                        <strong style={{color:accent}}>Логика:</strong> {data.reason}
                        {data.fvg&&<div style={{marginTop:6,color:"#e8c94a"}}>⚡ FVG CE: {data.fvg.ce.toFixed(5)}</div>}
                        {data.ob&&<div style={{marginTop:6,color:"#7fb3e0"}}>📦 OB: {data.ob.type} @ {data.ob.close.toFixed(5)}</div>}
                    </div>
                </div>
            );
        }

        function NewsRiskPanel({news}){
            if(!news) return null;
            const riskColors={high:"#ff6677",medium:"#e8c94a",low:"#22dd88"};
            const c=riskColors[news.riskLevel];
            
            return(
                <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${c}40`,borderRadius:12,padding:"12px",marginBottom:12}}>
                    <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>📰 NEWS FILTER</div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                        <div style={{width:12,height:12,borderRadius:"50%",background:c,animation:news.riskLevel==="high"?"pulse 1s infinite":"none"}}/>
                        <div style={{flex:1}}>
                            <div style={{fontSize:12,fontWeight:700,color:c}}>
                                {news.riskLevel==="high"?"ВЫСОКИЙ РИСК":news.riskLevel==="medium"?"СРЕДНИЙ РИСК":"НИЗКИЙ РИСК"}
                            </div>
                            <div style={{fontSize:10,color:"#8899aa",marginTop:2}}>
                                {news.nextHighImpact?.title} — через {news.nextHighImpact?.hoursUntil}ч
                            </div>
                        </div>
                    </div>
                    {news.riskLevel==="high"&&(
                        <div style={{marginTop:8,padding:8,background:"rgba(255,68,85,.1)",borderRadius:6,fontSize:10,color:"#ff8899"}}>
                            ⚠️ Вход запрещён: до новостей менее 60 минут
                        </div>
                    )}
                </div>
            );
        }

        // ─── Main App ─────────────────────────────────────────────────────────────────
        function App(){
            const [selectedPair,setSelectedPair]=useState(PAIRS[0]);
            const [loading,setLoading]=useState(false);
            const [result,setResult]=useState(null);
            const [error,setError]=useState(null);
            const [liveData,setLiveData]=useState(null);
            const [news,setNews]=useState(null);
            const [dots,setDots]=useState(0);
            
            useEffect(()=>{
                if(!loading) return;
                const i=setInterval(()=>setDots(d=>(d+1)%4),400);
                return()=>clearInterval(i);
            },[loading]);

            const scan=async()=>{
                if(loading) return;
                setLoading(true);
                setError(null);
                
                try{
                    // Параллельная загрузка данных
                    const[priceData,newsData]=await Promise.all([
                        fetchLivePrices(selectedPair.pair),
                        fetchForexFactoryNews()
                    ]);
                    
                    setLiveData(priceData);
                    setNews(newsData);
                    
                    // Имитация глубокого анализа
                    await new Promise(r=>setTimeout(r,2000));
                    
                    // Проверка новостного фильтра
                    if(newsData?.riskLevel==="high"&&newsData?.nextHighImpact?.hoursUntil<1){
                        setResult({
                            noTrade:true,
                            reason:"Высокий новостной риск — ожидайте после публикации",
                            context:`${selectedPair.pair} @ ${priceData.price}`
                        });
                    }else{
                        const analysis=performICTAnalysis(selectedPair,priceData.price,priceData.dxy);
                        setResult(analysis);
                    }
                }catch(e){
                    setError("Ошибка загрузки данных: "+e.message);
                }finally{
                    setLoading(false);
                }
            };

            return(
                <div style={{minHeight:"100vh",background:"#060c14",paddingBottom:100}}>
                    {/* Header */}
                    <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(6,12,20,.98)",borderBottom:"1px solid rgba(100,160,220,.14)",padding:"12px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                            <div>
                                <div style={{fontSize:14,color:"#eef5ff",letterSpacing:2,fontWeight:700}}>
                                    FX SCANNER <span style={{fontSize:9,color:"#22cc88",border:"1px solid rgba(34,204,136,.32)",borderRadius:4,padding:"1px 5px"}}>v5 ICT</span>
                                </div>
                                <div style={{fontSize:8,color:"#bbddee",letterSpacing:2}}>OB · FVG · SMC · DXY · NEWS</div>
                            </div>
                        </div>
                    </div>

                    <div style={{padding:"12px 12px 20px"}}>
                        <KillZoneIndicator/>
                        
                        {/* Pair Selector */}
                        <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8,fontWeight:600}}>ВАЛЮТНАЯ ПАРА</div>
                        <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:4,marginBottom:12}}>
                            {PAIRS.map(p=>{
                                const isSelected=p.pair===selectedPair.pair;
                                return(
                                    <div key={p.pair} onClick={()=>{setSelectedPair(p);setResult(null);}}
                                        style={{flexShrink:0,background:isSelected?"rgba(34,204,136,.15)":"rgba(17,29,42,.9)",border:`1px solid ${isSelected?"rgba(34,204,136,.58)":"rgba(100,160,220,.18)"}`,borderRadius:20,padding:"8px 14px",fontSize:12,color:isSelected?"#22dd88":"#aabbcc",cursor:"pointer",fontWeight:isSelected?700:500}}>
                                        {p.pair}
                                    </div>
                                );
                            })}
                        </div>

                        {liveData?.price&&(
                            <div style={{padding:"12px 14px",background:"rgba(34,204,136,.08)",border:"1px solid rgba(34,204,136,.25)",borderRadius:10,marginBottom:12,textAlign:"center"}}>
                                <span style={{fontSize:12,color:"#22dd88",fontWeight:700}}>💹 {selectedPair.pair} = {liveData.price}</span>
                                {liveData.dxy&&<span style={{marginLeft:12,fontSize:11,color:"#7fb3e0"}}>DXY: {liveData.dxy}</span>}
                            </div>
                        )}

                        {error&&<div style={{background:"rgba(255,68,85,.09)",border:"1px solid rgba(255,68,85,.32)",borderRadius:10,padding:"12px",marginBottom:12,color:"#ffaaaa"}}>⚠ {error}</div>}

                        {loading&&(
                            <div style={{textAlign:"center",padding:"40px 20px"}}>
                                <div style={{fontSize:12,color:"#22cc88",letterSpacing:2}}>
                                    ГЛУБОКИЙ АНАЛИЗ ICT/SMC{".".repeat(dots)}
                                </div>
                                <div style={{marginTop:8,fontSize:10,color:"#8899aa"}}>Анализ структуры · Поиск FVG · Оценка ликвидности</div>
                                <div style={{marginTop:20,height:4,borderRadius:2,background:"rgba(255,255,255,.1)",overflow:"hidden"}}>
                                    <div style={{height:"100%",width:"60%",background:"linear-gradient(90deg,#22cc88,#44ffaa)",animation:"shimmer 1.4s infinite",backgroundSize:"200% 100%"}}/>
                                </div>
                            </div>
                        )}

                        {result&&!loading&&(
                            <>
                                {result.noTrade?(
                                    <div style={{padding:"20px",background:"rgba(255,68,85,.1)",border:"1px solid rgba(255,68,85,.3)",borderRadius:12,textAlign:"center"}}>
                                        <div style={{fontSize:24,marginBottom:8}}>🚫</div>
                                        <div style={{fontSize:14,fontWeight:700,color:"#ff8899"}}>NO TRADE</div>
                                        <div style={{fontSize:11,color:"#ccdde8",marginTop:8}}>{result.reason}</div>
                                    </div>
                                ):(
                                    <>
                                        <div style={{padding:"10px 14px",marginBottom:12,borderLeft:"2px solid rgba(127,179,224,.45)",fontSize:12,color:"#ccdde8"}}>{result.context}</div>
                                        
                                        {liveData?.dxy&&<DXYPanel dxy={liveData.dxy} bias={result.dxyBias}/>}
                                        <NewsRiskPanel news={news}/>
                                        <PremiumDiscountMeter pd={result.premiumDiscount}/>
                                        
                                        {result.regime&&(
                                            <div style={{background:"rgba(12,18,28,.9)",border:`1px solid ${result.regime.score>60?"#22cc88":"#e8c94a"}30`,borderRadius:12,padding:"12px",marginBottom:12}}>
                                                <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8}}>📈 РЕЖИМ РЫНКА</div>
                                                <div style={{fontSize:13,fontWeight:700,color:result.regime.score>60?"#22cc88":"#e8c94a"}}>
                                                    {result.regime.type.replace(/_/g," ").toUpperCase()} · {result.regime.score}/100
                                                </div>
                                                <div style={{fontSize:10,color:"#8899aa",marginTop:4}}>{result.regime.description}</div>
                                            </div>
                                        )}
                                        
                                        {result.fvg&&<FVGCard fvg={result.fvg}/>}
                                        
                                        <div style={{fontSize:10,color:"#aabbdd",letterSpacing:2,marginBottom:8,marginTop:16}}>🎯 ТОРГОВЫЕ СЕТАПЫ</div>
                                        
                                        {result.priority==="buy"&&<div style={{marginBottom:8,padding:"6px 12px",background:"rgba(34,221,136,.1)",borderRadius:6,fontSize:11,color:"#22dd88"}}>✓ Приоритет: BUY (Сильный сетап)</div>}
                                        {result.priority==="sell"&&<div style={{marginBottom:8,padding:"6px 12px",background:"rgba(255,102,119,.1)",borderRadius:6,fontSize:11,color:"#ff6677"}}>✓ Приоритет: SELL (Сильный сетап)</div>}
                                        
                                        <SetupCardICT data={result.buy} isBuy={true} confidence={result.confidence}/>
                                        <SetupCardICT data={result.sell} isBuy={false} confidence={result.confidence}/>
                                        
                                        <div style={{marginTop:16,padding:"12px",background:"rgba(17,29,42,.9)",borderRadius:10,fontSize:10,color:"#8899aa",lineHeight:1.6}}>
                                            <strong style={{color:"#ccdde8"}}>⚠️ Risk Management:</strong><br/>
                                            • Макс 1-2 сделки в день<br/>
                                            • Только в Kill Zone окнах<br/>
                                            • SL за структурной инвалидацией<br/>
                                            • Минимум RR 1:2.5 для TP1
                                        </div>
                                    </>
                                )}
                            </>
                        )}

                        {!result&&!loading&&!error&&(
                            <div style={{textAlign:"center",padding:"60px 20px",border:"1px dashed rgba(255,255,255,.07)",borderRadius:14}}>
                                <div style={{fontSize:32,opacity:.15,marginBottom:10}}>◈</div>
                                <div style={{fontSize:12,color:"#8899bb",letterSpacing:2,marginBottom:10}}>ВЫБЕРИ ПАРУ И НАЖМИ СКАНИРОВАТЬ</div>
                                <div style={{fontSize:11,color:"#ccdde8",lineHeight:2}}>ICT Smart Money Concepts<br/>Order Blocks · Fair Value Gaps · Liquidity Sweeps</div>
                            </div>
                        )}
                    </div>

                    {/* Bottom Button */}
                    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(6,12,20,.98)",borderTop:"1px solid rgba(100,160,220,.14)",padding:"12px 14px 20px"}}>
                        <button onClick={scan} disabled={loading}
                            style={{width:"100%",height:56,background:loading?"rgba(34,204,136,.04)":"linear-gradient(135deg,rgba(34,204,136,.22),rgba(34,204,136,.09))",border:`1px solid rgba(34,204,136,${loading?.14:.52})`,borderRadius:12,color:loading?"rgba(34,204,136,.35)":"#22dd88",fontSize:16,fontWeight:700,letterSpacing:2,cursor:loading?"not-allowed":"pointer"}}>
                            {loading?`АНАЛИЗИРУЮ${".".repeat(dots)}`:"🔬 ICT/SMC СКАН"}
                        </button>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
