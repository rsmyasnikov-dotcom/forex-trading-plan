<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>FX AI Scanner</title>
  
  <!-- Загрузка React и ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Красивые современные шрифты -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: #0B1120;
      --bg-card: #111827;
      --bg-hover: #1F2937;
      --border-color: #1E293B;
      --text-main: #F8FAFC;
      --text-muted: #94A3B8;
      --color-buy: #10B981;
      --color-buy-bg: rgba(16, 185, 129, 0.1);
      --color-sell: #EF4444;
      --color-sell-bg: rgba(239, 68, 68, 0.1);
      --color-warn: #F59E0B;
      --color-info: #3B82F6;
    }
    
    body {
      margin: 0; padding: 0;
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { display: none; }
    
    button {
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
    }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Анимации */
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    @keyframes progress-slide { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: var(--border-color);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 12px;
    }
    
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-info), var(--color-buy), var(--color-info));
      background-size: 200% 100%;
      animation: progress-slide 2s linear infinite;
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const PAIRS =["EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CAD","NZD/USD","USD/CHF","GBP/JPY"];

    // =====================================================================
    // 🔴 ВСТАВЬТЕ ВАШ API КЛЮЧ GEMINI СЮДА 🔴
    const GEMINI_API_KEY = "ТВОЙ_API_КЛЮЧ_GEMINI";
    // =====================================================================

    // --- Функции парсинга и расчетов ---
    function getMoscowTime() { 
      return new Date().toLocaleTimeString("ru-RU", { hour: "2-digit", minute: "2-digit", timeZone: "Europe/Moscow" }); 
    }

    async function fetchLivePrices(pairs) {
      function toYahoo(p) { return p.replace("/", "") + "=X"; }
      try {
        const symbols = pairs.map(toYahoo).join(",");
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice,symbol`)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Ошибка сети');
        const data = await response.json();
        const yahooData = JSON.parse(data.contents);
        const out = {};
        for (const q of yahooData?.quoteResponse?.result ||[]) {
          const p = pairs.find(x => toYahoo(x) === q.symbol);
          if (p && q.regularMarketPrice) {
            out[p] = parseFloat(q.regularMarketPrice > 10 ? q.regularMarketPrice.toFixed(3) : q.regularMarketPrice.toFixed(5));
          }
        }
        if (!Object.keys(out).length) throw new Error("Пустые данные");
        return out;
      } catch (err) {
        console.error("Ошибка котировок:", err);
        return {};
      }
    }

    function extractJSON(text) {
      let cleaned = text.replace(/```json\s*/gi, "").replace(/```\s*/g, "").trim();
      const start = cleaned.indexOf("{");
      const end = cleaned.lastIndexOf("}");
      if (start !== -1 && end !== -1) {
        cleaned = cleaned.slice(start, end + 1);
      }
      try { return JSON.parse(cleaned); } catch(e) { throw new Error("Сбой формата ИИ"); }
    }

    function enforceRR(s, isBuy) {
      if (!s) return null;
      let entry = Number(s.entry_num) || 0;
      let sl = Number(s.sl_num) || 0;
      if (!entry || !sl) return s;
      const risk = Math.abs(entry - sl);
      const dir = isBuy ? 1 : -1;
      s.tp1_num = entry + dir * risk * 2.2;
      s.tp1 = s.tp1_num.toFixed(4);
      s.tp2_num = entry + dir * risk * 3.2;
      s.tp2 = s.tp2_num.toFixed(4);
      return s;
    }

    // --- Офлайн-заглушка на случай блокировки VPN ---
    function offlineAnalysis(pair, price, isDeep) {
      const p = parseFloat(price) || (pair.includes("JPY") ? 150.00 : 1.1000);
      const isJPY = pair.includes("JPY");
      const fmt = v => v.toFixed(isJPY ? 3 : 4);
      const atr = isJPY ? 0.15 : 0.0015;
      const roundStep = isJPY ? 0.5 : 0.005;
      const nearRes = Math.ceil(p / roundStep) * roundStep;
      const nearSup = Math.floor(p / roundStep) * roundStep;
      const bias = (nearRes - p < p - nearSup) ? "sell" : "buy";
      
      const sl = bias === "buy" ? nearSup - atr : nearRes + atr;
      const entry = bias === "buy" ? nearSup + (atr*0.2) : nearRes - (atr*0.2);

      return {
        mode: isDeep ? "deep" : "quick",
        context: `СЕРВЕР НЕДОСТУПЕН. Показан математический расчет от уровней для ${pair} по цене ${fmt(p)}.`,
        signal: bias,
        confidence: 60,
        _offline: true,
        entry_num: entry,
        entry_zone: fmt(entry),
        sl_num: sl,
        sl: fmt(sl),
        tp1_num: bias === "buy" ? entry + atr*2.2 : entry - atr*2.2,
        news_risk: "medium",
        buy: bias === "buy" ? enforceRR({ entry_num: entry, sl_num: sl, confidence: 60, pattern: "Отскок от поддержки" }, true) : null,
        sell: bias === "sell" ? enforceRR({ entry_num: entry, sl_num: sl, confidence: 60, pattern: "Отбой от сопротивления" }, false) : null,
        market_regime: { type: "range", description: "Математический расчет без ИИ", score: 50 },
        sr_levels:[
          { type: "resistance", price: fmt(nearRes), price_num: nearRes, description: "Сопротивление" },
          { type: "support", price: fmt(nearSup), price_num: nearSup, description: "Поддержка" }
        ]
      };
    }

    // --- Промпт для ИИ ---
    function buildPrompt(pair, dateStr, livePrice) {
      return `Отвечай СТРОГО в формате JSON. Никакого лишнего текста.
Пара: ${pair}. Текущая цена: ${livePrice || 'неизвестно'}. Дата: ${dateStr}.
Ты - профессиональный трейдер. Проведи глубокий технический анализ.

Сгенерируй JSON строго по этому шаблону:
{
  "mode": "deep",
  "context": "Краткое описание ситуации на рынке на русском языке.",
  "signal": "buy или sell или no_trade",
  "confidence": 85,
  "market_regime": { "type": "trend или range", "description": "описание" },
  "sr_levels":[
    {"type": "resistance", "price": "1.1050", "price_num": 1.1050, "description": "описание"},
    {"type": "support", "price": "1.0950", "price_num": 1.0950, "description": "описание"}
  ],
  "buy": { "entry_num": 1.0960, "sl_num": 1.0930, "pattern": "пинбар/OB", "reasoning": "почему покупаем" },
  "sell": { "entry_num": 1.1040, "sl_num": 1.1070, "pattern": "поглощение/OB", "reasoning": "почему продаем" },
  "no_trade": null,
  "news_risk": "low или medium или high"
}`;
    }

    // --- Главный Компонент Приложения ---
    function App() {
      const[pair, setPair] = useState("EUR/USD");
      const [loading, setLoading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [loadingText, setLoadingText] = useState("");
      
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);
      const [clock, setClock] = useState(getMoscowTime());

      // Часы
      useEffect(() => {
        const iv = setInterval(() => setClock(getMoscowTime()), 1000);
        return () => clearInterval(iv);
      },[]);

      // Эффект прогресс-бара
      useEffect(() => {
        if (!loading) {
          setProgress(0);
          return;
        }
        const texts =[
          "Подключение к серверам API...",
          "Сбор котировок в реальном времени...",
          "Запрос к нейросети Gemini...",
          "Анализ структуры и уровней...",
          "Формирование торгового плана..."
        ];
        let step = 0;
        setLoadingText(texts[0]);
        
        const interval = setInterval(() => {
          setProgress(p => {
            const next = p + Math.random() * 15;
            return next > 90 ? 90 : next; // Зависаем на 90%, пока не придет ответ
          });
          step++;
          if (step % 3 === 0 && step / 3 < texts.length) {
            setLoadingText(texts[step / 3]);
          }
        }, 600);
        return () => clearInterval(interval);
      }, [loading]);

      const startScan = async () => {
        if (loading) return;
        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const now = new Date().toLocaleDateString("ru-RU");
          
          // 1. Получаем цены
          setLoadingText("Получение котировок...");
          const prices = await fetchLivePrices([pair]);
          const currentPrice = prices[pair] || null;

          // 2. Делаем запрос к Gemini
          const prompt = buildPrompt(pair, now, currentPrice);
          const requestBody = {
            contents: [{ parts:[{ text: prompt }] }],
            generationConfig: { responseMimeType: "application/json" }
          };

          // Вы можете поменять 1.5-flash на gemini-pro, если ключ не работает
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(requestBody)
          });

          if (!res.ok) {
            throw new Error(`Ошибка API (VPN выключен или ключ неверный)`);
          }

          const data = await res.json();
          const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
          
          if (!rawText) throw new Error("Пустой ответ от ИИ");

          let parsed = extractJSON(rawText);
          
          // Корректируем R:R математически
          if (parsed.buy) parsed.buy = enforceRR(parsed.buy, true);
          if (parsed.sell) parsed.sell = enforceRR(parsed.sell, false);
          
          setProgress(100);
          setLoadingText("Анализ завершен!");
          setTimeout(() => {
            setResult(parsed);
            setLoading(false);
          }, 400);

        } catch (err) {
          console.warn("Сбой ИИ, переход в офлайн:", err);
          // В случае ошибки показываем офлайн-расчет, чтобы приложение не висело
          const fallback = offlineAnalysis(pair, 1.1000, true);
          setProgress(100);
          setTimeout(() => {
            setResult(fallback);
            setError(`Нейросеть недоступна (${err.message}). Показан математический расчет.`);
            setLoading(false);
          }, 400);
        }
      };

      // РЕНДЕР ИНТЕРФЕЙСА
      return (
        <div>
          {/* Верхняя панель */}
          <div style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(11, 17, 32, 0.95)", backdropFilter: "blur(10px)", borderBottom: "1px solid var(--border-color)", padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontWeight: 700, color: "var(--text-main)", fontSize: "16px" }}>
                FX AI <span style={{ color: "var(--color-buy)" }}>Сканнер</span>
              </div>
              <div style={{ fontSize: "10px", color: "var(--text-muted)" }}>Gemini Pro Engine</div>
            </div>
            <div className="mono" style={{ fontWeight: 700, fontSize: "14px", color: "var(--color-info)" }}>
              {clock} МСК
            </div>
          </div>

          <div style={{ padding: "16px", paddingBottom: "100px" }}>
            
            {/* Выбор пары */}
            <div style={{ marginBottom: "20px" }}>
              <div style={{ fontSize: "12px", color: "var(--text-muted)", marginBottom: "8px", fontWeight: 600 }}>ВЫБЕРИТЕ ПАРУ:</div>
              <div style={{ display: "flex", gap: "8px", overflowX: "auto", paddingBottom: "8px" }}>
                {PAIRS.map(p => (
                  <button 
                    key={p} 
                    onClick={() => { setPair(p); setResult(null); setError(null); }}
                    style={{
                      flexShrink: 0,
                      background: p === pair ? "var(--color-buy-bg)" : "var(--bg-card)",
                      border: `1px solid ${p === pair ? "var(--color-buy)" : "var(--border-color)"}`,
                      color: p === pair ? "var(--color-buy)" : "var(--text-main)",
                      padding: "10px 16px",
                      borderRadius: "12px",
                      fontWeight: 600,
                      fontSize: "14px"
                    }}
                  >
                    {p}
                  </button>
                ))}
              </div>
            </div>

            {/* Блок загрузки (Прогресс бар) */}
            {loading && (
              <div className="card" style={{ textAlign: "center", padding: "30px 20px" }}>
                <div style={{ fontSize: "24px", marginBottom: "12px", animation: "pulse 1.5s infinite" }}>🤖</div>
                <div style={{ fontWeight: 600, color: "var(--color-info)", marginBottom: "8px" }}>Анализирую {pair}...</div>
                <div style={{ fontSize: "12px", color: "var(--text-muted)", height: "16px" }}>{loadingText}</div>
                <div className="progress-bar-container">
                  <div className="progress-bar-fill" style={{ width: `${progress}%` }}></div>
                </div>
              </div>
            )}

            {/* Вывод ошибки */}
            {error && !loading && (
              <div style={{ background: "var(--color-sell-bg)", border: "1px solid var(--color-sell)", padding: "12px", borderRadius: "12px", color: "#FCA5A5", fontSize: "12px", marginBottom: "16px", lineHeight: 1.5 }}>
                {error}
                <br/>💡 Убедитесь, что ваш VPN включен и ключ Gemini верен.
              </div>
            )}

            {/* Вывод результата */}
            {result && !loading && (
              <div>
                <div className="card">
                  <div style={{ fontSize: "11px", color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "8px" }}>Сводка ИИ</div>
                  <div style={{ fontSize: "14px", lineHeight: 1.6, color: "var(--text-main)" }}>
                    {result.context}
                  </div>
                </div>

                {result.buy && (
                  <div className="card" style={{ borderLeft: "4px solid var(--color-buy)" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                      <div style={{ fontWeight: 700, color: "var(--color-buy)", fontSize: "16px" }}>🟢 ПОКУПКА (BUY)</div>
                      <div className="mono" style={{ background: "var(--color-buy-bg)", color: "var(--color-buy)", padding: "4px 8px", borderRadius: "6px", fontSize: "12px", fontWeight: 700 }}>
                        ВХОД: {result.buy.entry_num || result.buy.entry_zone}
                      </div>
                    </div>
                    
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px" }}>
                      <div style={{ background: "rgba(0,0,0,0.2)", padding: "10px", borderRadius: "8px" }}>
                        <div style={{ fontSize: "10px", color: "var(--text-muted)", marginBottom: "4px" }}>STOP LOSS</div>
                        <div className="mono" style={{ color: "var(--color-sell)", fontWeight: 700, fontSize: "15px" }}>{result.buy.sl_num || result.buy.sl}</div>
                      </div>
                      <div style={{ background: "rgba(0,0,0,0.2)", padding: "10px", borderRadius: "8px" }}>
                        <div style={{ fontSize: "10px", color: "var(--text-muted)", marginBottom: "4px" }}>TAKE PROFIT 1</div>
                        <div className="mono" style={{ color: "var(--color-buy)", fontWeight: 700, fontSize: "15px" }}>{result.buy.tp1_num || result.buy.tp1}</div>
                      </div>
                    </div>
                    
                    <div style={{ fontSize: "12px", color: "var(--text-muted)", borderTop: "1px solid var(--border-color)", paddingTop: "12px" }}>
                      <strong>Обоснование:</strong> {result.buy.reasoning || "Алгоритмический расчет от уровней."}
                    </div>
                  </div>
                )}

                {result.sell && (
                  <div className="card" style={{ borderLeft: "4px solid var(--color-sell)" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "16px" }}>
                      <div style={{ fontWeight: 700, color: "var(--color-sell)", fontSize: "16px" }}>🔴 ПРОДАЖА (SELL)</div>
                      <div className="mono" style={{ background: "var(--color-sell-bg)", color: "var(--color-sell)", padding: "4px 8px", borderRadius: "6px", fontSize: "12px", fontWeight: 700 }}>
                        ВХОД: {result.sell.entry_num || result.sell.entry_zone}
                      </div>
                    </div>
                    
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px", marginBottom: "16px" }}>
                      <div style={{ background: "rgba(0,0,0,0.2)", padding: "10px", borderRadius: "8px" }}>
                        <div style={{ fontSize: "10px", color: "var(--text-muted)", marginBottom: "4px" }}>STOP LOSS</div>
                        <div className="mono" style={{ color: "var(--color-sell)", fontWeight: 700, fontSize: "15px" }}>{result.sell.sl_num || result.sell.sl}</div>
                      </div>
                      <div style={{ background: "rgba(0,0,0,0.2)", padding: "10px", borderRadius: "8px" }}>
                        <div style={{ fontSize: "10px", color: "var(--text-muted)", marginBottom: "4px" }}>TAKE PROFIT 1</div>
                        <div className="mono" style={{ color: "var(--color-buy)", fontWeight: 700, fontSize: "15px" }}>{result.sell.tp1_num || result.sell.tp1}</div>
                      </div>
                    </div>
                    
                    <div style={{ fontSize: "12px", color: "var(--text-muted)", borderTop: "1px solid var(--border-color)", paddingTop: "12px" }}>
                      <strong>Обоснование:</strong> {result.sell.reasoning || "Алгоритмический расчет от уровней."}
                    </div>
                  </div>
                )}

                {result.sr_levels && result.sr_levels.length > 0 && (
                  <div className="card">
                    <div style={{ fontSize: "11px", color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "12px" }}>Ключевые уровни</div>
                    {result.sr_levels.map((lvl, idx) => (
                      <div key={idx} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: idx !== result.sr_levels.length - 1 ? "1px solid var(--border-color)" : "none" }}>
                        <div style={{ fontSize: "12px", color: lvl.type === "support" ? "var(--color-buy)" : "var(--color-sell)", fontWeight: 600 }}>
                          {lvl.type === "support" ? "ПОДДЕРЖКА" : "СОПРОТИВЛЕНИЕ"}
                        </div>
                        <div className="mono" style={{ fontSize: "13px", fontWeight: 700 }}>{lvl.price}</div>
                      </div>
                    ))}
                  </div>
                )}

              </div>
            )}

            {/* Приветственный экран (пока не нажали кнопку) */}
            {!result && !loading && !error && (
               <div className="card" style={{ textAlign: "center", padding: "40px 20px", background: "transparent", border: "1px dashed var(--border-color)" }}>
                 <div style={{ fontSize: "40px", opacity: 0.5, marginBottom: "16px" }}>⚡</div>
                 <div style={{ fontWeight: 600, color: "var(--text-main)", marginBottom: "8px" }}>Сканнер готов к работе</div>
                 <div style={{ fontSize: "13px", color: "var(--text-muted)", lineHeight: 1.5 }}>
                   Нажмите кнопку ниже, чтобы запустить глубокий анализ структуры рынка, объемов и уровней для выбранной пары.
                 </div>
               </div>
            )}

          </div>

          {/* Нижняя фиксированная кнопка */}
          <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "16px", background: "rgba(11, 17, 32, 0.95)", backdropFilter: "blur(10px)", borderTop: "1px solid var(--border-color)" }}>
            <button 
              onClick={startScan} 
              disabled={loading}
              style={{
                width: "100%",
                padding: "16px",
                background: loading ? "var(--bg-hover)" : "var(--color-buy)",
                color: loading ? "var(--text-muted)" : "#fff",
                border: "none",
                borderRadius: "12px",
                fontSize: "16px",
                fontWeight: 700,
                boxShadow: loading ? "none" : "0 4px 14px rgba(16, 185, 129, 0.4)"
              }}
            >
              {loading ? "ИДЕТ АНАЛИЗ..." : `🚀 СКАНИРОВАТЬ ${pair}`}
            </button>
          </div>
        </div>
      );
    }

    // Рендер приложения
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
