<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Forex Trading Plan</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; line-height: 1.6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background-color: #1e1e1e; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1, h2 { color: #4CAF50; border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
        .section { background-color: #2a2a2a; border: 1px solid #333; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        label { display: block; font-weight: bold; margin-top: 15px; color: #b0b0b0; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; padding: 10px; margin-top: 5px; background-color: #333; border: 1px solid #555; border-radius: 5px; color: #e0e0e0; box-sizing: border-box; }
        textarea { resize: vertical; min-height: 80px; }
        button { background-color: #4CAF50; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 20px; transition: background-color 0.3s; }
        button:hover { background-color: #45a049; }
        .button-secondary { background-color: #555; }
        .button-secondary:hover { background-color: #666; }
        .output { background-color: #1a1a1a; border: 1px solid #4CAF50; border-radius: 8px; padding: 20px; margin-top: 20px; white-space: pre-wrap; font-family: "Courier New", Courier, monospace; display: none; }
        .rr-info { font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 5px; }
        .rr-ok { color: #4CAF50; background-color: rgba(76, 175, 80, 0.1); }
        .rr-bad { color: #f44336; background-color: rgba(244, 67, 54, 0.1); }
        .pair-input { font-size: 24px; font-weight: bold; text-align: center; border: none; background: transparent; border-bottom: 2px solid #555; color: #fff; margin-bottom: 20px; }
        .pair-input:focus { outline: none; border-bottom-color: #4CAF50; }
        .flex-container { display: flex; gap: 20px; }
        .flex-item { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <h1>Торговый План Pro</h1>
    <input type="text" id="pair" class="pair-input" placeholder="Введите пару, например EURUSD">

    <!-- ======================= STEP 1: D1/H4 CONTEXT ======================= -->
    <div class="section">
        <h2>Шаг 1: Контекст D1 / H4</h2>
        <label for="htf_trend">Основное направление (D1/H4 Trend)</label>
        <select id="htf_trend">
            <option value="Bullish">Бычий (Bullish)</option>
            <option value="Bearish">Медвежий (Bearish)</option>
            <option value="Range">Рендж (Range)</option>
        </select>

        <label for="market_regime">Текущий режим рынка</label>
        <select id="market_regime">
            <option value="Trend">Тренд (импульс)</option>
            <option value="Pullback">Откат (коррекция)</option>
            <option value="Range">Консолидация (Рендж)</option>
            <option value="Expansion">Экспансия (пробой)</option>
            <option value="Compression">Компрессия ликвидности</option>
        </select>

        <label for="dxy_context">Контекст DXY (если торгуется USD)</label>
        <textarea id="dxy_context" placeholder="Например: DXY находится в зоне Premium на H4, ожидается коррекция вниз, что поддержит сценарий на покупку EURUSD."></textarea>
        
        <label for="macro_context">Макроэкономический фон и ближайшие важные новости</label>
        <textarea id="macro_context" placeholder="Например: Завтра данные по CPI в США. Сегодня рынок может быть в режиме ожидания. Риски повышены."></textarea>
        <button class="button-secondary" onclick="window.open('https://www.investing.com/economic-calendar/', '_blank')">Открыть Экономический Календарь</button>
    </div>

    <!-- ======================= STEP 2: H1 ENTRY SETUP ======================= -->
    <div class="section">
        <h2>Шаг 2: Сетап на H1</h2>
        <label for="scenario_type">Приоритетный сценарий</label>
        <select id="scenario_type">
            <option value="BUY">BUY Limit</option>
            <option value="SELL">SELL Limit</option>
        </select>
        
        <label for="poi_h1">Зона Интереса (POI) на H1</label>
        <select id="poi_h1">
            <option value="Order Block (OB)">Order Block (OB)</option>
            <option value="Fair Value Gap (FVG) / Imbalance">Fair Value Gap (FVG) / Imbalance</option>
            <option value="Support/Resistance Flip">Зеркальный уровень (S/R Flip)</option>
            <option value="Liquidity Retest (EQL/EQH)">Ретест зоны ликвидности (EQL/EQH)</option>
            <option value="Premium/Discount Zone">Ключевая зона Premium/Discount</option>
        </select>

        <label for="entry_logic">Обоснование для входа</label>
        <textarea id="entry_logic" placeholder="Опишите, почему цена должна отреагировать именно на эту зону. Например: Вход от H1 FVG, который находится в Discount зоне H4 и совпадает с 0.618 Фибоначчи от последнего импульса. Перед зоной есть пул ликвидности (EQL), который цена скорее всего снимет перед разворотом."></textarea>
    </div>

    <!-- ======================= STEP 3: RISK & TRADE MANAGEMENT ======================= -->
    <div class="section">
        <h2>Шаг 3: Расчет риска и целей</h2>
        <div class="flex-container">
            <div class="flex-item">
                <label for="entry_price">Цена входа (Limit)</label>
                <input type="number" id="entry_price" placeholder="1.07500" step="0.00001" oninput="calculateRR()">
            </div>
            <div class="flex-item">
                <label for="stop_loss">Цена Stop Loss</label>
                <input type="number" id="stop_loss" placeholder="1.07250" step="0.00001" oninput="calculateRR()">
            </div>
        </div>
        
        <label for="sl_logic">Обоснование для Stop Loss</label>
        <textarea id="sl_logic" placeholder="Например: SL установлен за минимумом Order Block, так как его пробой инвалидирует всю идею бычьего сценария."></textarea>
        
        <div class="flex-container">
            <div class="flex-item">
                <label for="tp1">Цена Take Profit 1</label>
                <input type="number" id="tp1" placeholder="1.08050" step="0.00001" oninput="calculateRR()">
            </div>
            <div class="flex-item">
                <label for="tp2">Цена Take Profit 2 (опционально)</label>
                <input type="number" id="tp2" placeholder="1.08500" step="0.00001" oninput="calculateRR()">
            </div>
        </div>
        <div id="rr_info" class="rr-info"></div>
    </div>

    <!-- ======================= STEP 4: FINAL DECISION ======================= -->
    <div class="section">
        <h2>Шаг 4: Итоговое решение</h2>
        <label for="confidence_level">Уровень уверенности</label>
        <select id="confidence_level">
            <option value="Высокая">Высокая (Все факторы совпадают)</option>
            <option value="Средняя">Средняя (Есть незначительные противоречия)</option>
            <option value="Низкая">Низкая (Значительные риски, лучше пропустить)</option>
        </select>

        <label for="final_notes">Дополнительные заметки</label>
        <textarea id="final_notes" placeholder="Например: Следить за реакцией на M15 при подходе к POI. Если будет агрессивная реакция без подтверждения - вход пропускаем."></textarea>
        
        <button onclick="generatePlan()">Сформировать Торговый План</button>
        <button class="button-secondary" onclick="decideNoTrade()">Решение: NO TRADE</button>
    </div>

    <!-- ======================= OUTPUT ======================= -->
    <div id="output" class="output"></div>

</div>

<script>
    function calculateRR() {
        const entry = parseFloat(document.getElementById('entry_price').value);
        const sl = parseFloat(document.getElementById('stop_loss').value);
        const tp1 = parseFloat(document.getElementById('tp1').value);
        const tp2 = parseFloat(document.getElementById('tp2').value);
        const scenario = document.getElementById('scenario_type').value;
        const rrInfo = document.getElementById('rr_info');

        if (!entry || !sl) {
            rrInfo.innerHTML = '';
            return;
        }

        const risk = Math.abs(entry - sl);
        if (risk === 0) {
            rrInfo.innerHTML = '';
            return;
        }

        let output = '';
        let isValid = true;

        if (tp1) {
            const reward1 = (scenario === 'BUY') ? (tp1 - entry) : (entry - tp1);
            if (reward1 > 0) {
                const rr1 = (reward1 / risk).toFixed(2);
                const rr1_class = rr1 >= 2.2 ? 'rr-ok' : 'rr-bad';
                output += `<div class="${rr1_class}">TP1 R/R: ${rr1}</div>`;
                if (rr1 < 2.2) isValid = false;
            }
        }

        if (tp2) {
            const reward2 = (scenario === 'BUY') ? (tp2 - entry) : (entry - tp2);
            if (reward2 > 0) {
                const rr2 = (reward2 / risk).toFixed(2);
                const rr2_class = rr2 >= 3.2 ? 'rr-ok' : 'rr-bad';
                output += `<div class="${rr2_class}" style="margin-top: 5px;">TP2 R/R: ${rr2}</div>`;
                if (rr2 < 3.2) isValid = false;
            }
        }
        
        rrInfo.innerHTML = output;
    }

    function generatePlan() {
        const pair = document.getElementById('pair').value.toUpperCase();
        if (!pair) {
            alert('Пожалуйста, введите торговую пару.');
            return;
        }

        const plan = `
## ТОРГОВЫЙ ПЛАН: ${pair} ##
Дата: ${new Date().toLocaleString()}
--------------------------------------------------

### 1. СТРАТЕГИЧЕСКИЙ КОНТЕКСТ (D1/H4)
- **Основное направление:** ${document.getElementById('htf_trend').value}
- **Текущий режим рынка:** ${document.getElementById('market_regime').value}
- **Контекст DXY:** ${document.getElementById('dxy_context').value || 'N/A'}
- **Макро-фон:** ${document.getElementById('macro_context').value}

### 2. ТАКТИЧЕСКИЙ СЕТАП (H1)
- **Приоритетный сценарий:** ${document.getElementById('scenario_type').value} Limit
- **Зона Интереса (POI):** ${document.getElementById('poi_h1').value}
- **Обоснование для входа:** ${document.getElementById('entry_logic').value}

### 3. ПАРАМЕТРЫ СДЕЛКИ
- **Entry Price:** ${document.getElementById('entry_price').value}
- **Stop Loss:** ${document.getElementById('stop_loss').value}
- **Обоснование SL:** ${document.getElementById('sl_logic').value}
- **Take Profit 1:** ${document.getElementById('tp1').value}
- **Take Profit 2:** ${document.getElementById('tp2').value || 'N/A'}
- **Расчетный R/R:** \n${document.getElementById('rr_info').innerText.replace(/\n/g, '\n  ')}

### 4. ИТОГОВОЕ РЕШЕНИЕ
- **Уровень уверенности:** ${document.getElementById('confidence_level').value}
- **Заметки:** ${document.getElementById('final_notes').value || 'Нет'}

--------------------------------------------------
        `;
        const outputDiv = document.getElementById('output');
        outputDiv.textContent = plan;
        outputDiv.style.display = 'block';
    }

    function decideNoTrade() {
        const pair = document.getElementById('pair').value.toUpperCase() || 'ДАННАЯ ПАРА';
         const plan = `
## ТОРГОВЫЙ ПЛАН: ${pair} ##
Дата: ${new Date().toLocaleString()}
--------------------------------------------------

### РЕШЕНИЕ: NO TRADE (НЕТ СДЕЛКИ) ###

**Причина:** Качественный сетап, соответствующий всем критериям торговой системы, на данный момент отсутствует. 
Рыночный контекст (например, ${document.getElementById('market_regime').value.toLowerCase()}) или предстоящие новости (${document.getElementById('macro_context').value || 'N/A'}) не позволяют открыть сделку с высоким уровнем вероятности.

**Лучшее действие:** Оставаться вне рынка и ожидать более ясных условий.

--------------------------------------------------
        `;
        const outputDiv = document.getElementById('output');
        outputDiv.textContent = plan;
        outputDiv.style.display = 'block';
    }

</script>

</body>
</html>
