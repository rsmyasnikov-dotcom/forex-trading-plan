<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Trading Plan - Professional Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>
    <div id="app"></div>
    
    <script>
        const data = {
            pair: "EUR/USD",
            currentPrice: 1.15221,
            timestamp: "2026-04-05",
            trend: { d1: "downtrend", h4: "range", bias: "bearish" },
            dxy: { current: 100.031, trend: "uptrend", bias: "bullish", correlation: -0.988 },
            atr: 0.00077,
            dailyRange: { high: 1.15513, low: 1.15168 },
            levels: { 
                support: [1.14591, 1.15237, 1.15808], 
                resistance: [1.14929, 1.15847],
                nearestSupport: 1.14591,
                nearestResistance: 1.15847
            },
            recommendation: { 
                action: "NO_TRADE", 
                confidence: "medium",
                direction: "bearish",
                reason: "D1 bearish but H4 consolidating. Insufficient RR ratio. Wait for resistance test at 1.15847."
            }
        };

        const app = document.getElementById('app');
        
        app.innerHTML = `
            <div class="min-h-screen p-4 md:p-6 max-w-7xl mx-auto">
                <header class="mb-8">
                    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h1 class="text-3xl md:text-4xl font-bold bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">
                                Forex Trading Plan
                            </h1>
                            <p class="text-slate-400 mt-1">Professional Day Trading Analysis</p>
                        </div>
                        <div class="text-xs text-slate-500">
                            <span class="inline-block w-2 h-2 bg-green-500 rounded-full mr-1 animate-pulse"></span>
                            Live • ${data.timestamp}
                        </div>
                    </div>
                </header>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Left Column -->
                    <div class="space-y-6">
                        <!-- Price Card -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-slate-400 text-sm">Current Price</span>
                                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                            </div>
                            <div class="text-4xl font-mono font-bold text-white">${data.currentPrice}</div>
                            <div class="flex items-center gap-2 mt-2 text-sm">
                                <span class="text-slate-400">24h Range:</span>
                                <span class="font-mono">${data.dailyRange.low} - ${data.dailyRange.high}</span>
                            </div>
                            <div class="mt-3 pt-3 border-t border-slate-800">
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400">ATR(14):</span>
                                    <span class="font-mono text-blue-400">${data.atr}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Trend Analysis -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                                <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                Trend Analysis
                            </h3>
                            <div class="space-y-3">
                                <div class="p-3 rounded-lg border bg-rose-500/10 border-rose-500/30">
                                    <div class="flex justify-between items-center">
                                        <span class="text-sm font-medium">D1 Timeframe</span>
                                        <span class="font-bold text-rose-400">BEARISH</span>
                                    </div>
                                    <div class="text-xs text-slate-400 mt-1">downtrend</div>
                                </div>
                                <div class="p-3 rounded-lg border bg-amber-500/10 border-amber-500/30">
                                    <div class="flex justify-between items-center">
                                        <span class="text-sm font-medium">H4 Timeframe</span>
                                        <span class="font-bold text-amber-400">RANGE</span>
                                    </div>
                                    <div class="text-xs text-slate-400 mt-1">Consolidation phase</div>
                                </div>
                            </div>
                        </div>

                        <!-- DXY -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                            <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">
                                <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Dollar Index (DXY)
                            </h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <div class="text-2xl font-mono font-bold">${data.dxy.current}</div>
                                    <div class="text-xs text-slate-400">Current</div>
                                </div>
                                <div>
                                    <div class="text-lg font-bold text-emerald-400">BULLISH</div>
                                    <div class="text-xs text-slate-400">Trend</div>
                                </div>
                            </div>
                            <div class="mt-3 pt-3 border-t border-slate-800">
                                <div class="flex justify-between text-sm">
                                    <span class="text-slate-400">Correlation:</span>
                                    <span class="font-mono text-rose-400">${data.dxy.correlation}</span>
                                </div>
                                <div class="text-xs text-slate-500 mt-1">Strong inverse correlation</div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Column -->
                    <div class="lg:col-span-2 space-y-6">
                        <!-- Recommendation -->
                        <div class="bg-slate-900/50 border-2 border-slate-700 rounded-2xl p-6">
                            <div class="flex items-center justify-between mb-6">
                                <h2 class="text-2xl font-bold">Trading Recommendation</h2>
                                <div class="px-4 py-2 rounded-full text-sm font-bold bg-slate-700 text-slate-300">
                                    NO TRADE
                                </div>
                            </div>

                            <div class="flex items-center gap-4 p-4 rounded-xl bg-slate-950/50 border border-slate-800">
                                <svg class="w-8 h-8 text-amber-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                <div>
                                    <div class="font-semibold text-amber-400">No Trade Setup</div>
                                    <div class="text-sm text-slate-400 mt-1">
                                        ${data.recommendation.reason}
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4 p-4 rounded-lg bg-slate-950/30 border border-slate-800">
                                <h4 class="font-semibold mb-2 flex items-center gap-2">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    Watch List Setup
                                </h4>
                                <ul class="text-sm text-slate-400 space-y-1">
                                    <li>• Set alert at 1.1580-1.1590 (resistance zone)</li>
                                    <li>• Wait for price rejection / bearish confirmation</li>
                                    <li>• Potential Sell Limit: 1.15847</li>
                                    <li>• SL: 1.16100 | TP1: 1.15200 | TP2: 1.14800</li>
                                    <li>• Expected RR: 2.5 / 4.0</li>
                                </ul>
                            </div>
                        </div>

                        <!-- Key Levels -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                            <h3 class="text-lg font-semibold mb-4">Key Levels</h3>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <div class="text-sm text-slate-400 mb-2">Support Zones</div>
                                    ${data.levels.support.map(l => `
                                        <div class="flex items-center gap-2 text-emerald-400 mb-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                                            <span class="font-mono">${l.toFixed(5)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                                <div>
                                    <div class="text-sm text-slate-400 mb-2">Resistance Zones</div>
                                    ${data.levels.resistance.map(l => `
                                        <div class="flex items-center gap-2 text-rose-400 mb-1">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
                                            <span class="font-mono">${l.toFixed(5)}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>

                        <!-- Context -->
                        <div class="bg-slate-900/50 border border-slate-800 rounded-2xl p-6">
                            <h3 class="text-lg font-semibold mb-4">Market Context</h3>
                            <div class="grid grid-cols-3 gap-4 text-center">
                                <div class="p-3 rounded-lg bg-slate-950/30">
                                    <div class="text-xs text-slate-400">D1 Bias</div>
                                    <div class="text-lg font-bold text-rose-400">BEARISH</div>
                                </div>
                                <div class="p-3 rounded-lg bg-slate-950/30">
                                    <div class="text-xs text-slate-400">H4 Structure</div>
                                    <div class="text-lg font-bold text-amber-400">RANGE</div>
                                </div>
                                <div class="p-3 rounded-lg bg-slate-950/30">
                                    <div class="text-xs text-slate-400">Confidence</div>
                                    <div class="text-lg font-bold text-amber-400">MEDIUM</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <footer class="mt-8 pt-6 border-t border-slate-800 text-center text-xs text-slate-500">
                    <p>Forex Trading Plan • Conservative Day Trading Strategy • D1/H4/H1 Analysis</p>
                    <p class="mt-1">Risk Warning: Trading involves substantial risk of loss. Past performance does not guarantee future results.</p>
                </footer>
            </div>
        `;
    </script>
</body>
</html>
