<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FX Scanner v8</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#0d1117;color:#c9d1d9;line-height:1.5}
        .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:16px}
        .btn{background:#238636;color:#fff;border:none;border-radius:6px;padding:12px 24px;font-size:14px;font-weight:600;cursor:pointer;width:100%}
        .btn:hover{background:#2ea043}
        .btn:disabled{background:#30363d;color:#8b949e;cursor:not-allowed}
        .text-green{color:#3fb950}
        .text-red{color:#f85149}
        .text-yellow{color:#d29922}
        .text-gray{color:#8b949e}
        .flex{display:flex;gap:12px;align-items:center}
        .grid{display:grid;gap:12px}
        .loading{animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const {useState,useEffect,useCallback}=React;
        
        // Безопасные утилиты
        const fmt=(n,d=5)=>typeof n==='number'&&!isNaN(n)?n.toFixed(d):'--';
        const num=n=>typeof n==='number'&&!isNaN(n)?n:0;
        
        // Данные
        const PAIRS=[
            {p:'EUR/USD',t:'major',w:-0.85},
            {p:'GBP/USD',t:'major',w:-0.9},
            {p:'USD/JPY',t:'major',w:0.88},
            {p:'AUD/USD',t:'commodity',w:-0.75},
            {p:'USD/CAD',t:'commodity',w:0.8},
            {p:'NZD/USD',t:'commodity',w:-0.7},
            {p:'USD/CHF',t:'major',w:0.82},
            {p:'GBP/JPY',t:'cross',w:0.05},
            {p:'XAU/USD',t:'metal',w:-0.6}
        ];
        
        const KZ=[
            {n:'Токио',s:2,e:5,c:'#58a6ff'},
            {n:'Лондон',s:10,e:14,c:'#3fb950'},
            {n:'Нью-Йорк',s:16,e:22,c:'#d29922'}
        ];
        
        // API
        async function getData(pair){
            try{
                const[b,q]=pair.split('/');
                const r=await fetch(`https://api.exchangerate-api.com/v4/latest/${b}`);
                const d=await r.json();
                const price=num(d?.rates?.[q]);
                if(!price)throw new Error('no data');
                
                // Генерируем свечи
                const candles=[];
                let p=price;
                for(let i=100;i>0;i--){
                    const ch=(Math.random()-0.5)*0.002;
                    const o=p;
                    p=p*(1+ch);
                    candles.push({
                        t:Date.now()/1000-i*3600,
                        o:o,
                        h:Math.max(o,p)*1.001,
                        l:Math.min(o,p)*0.999,
                        c:p
                    });
                }
                return{price,candles,dxy:103.5,src:'API'};
            }catch(e){
                const fallback={EUR:1.085,GBP:1.275,JPY:151.8,AUD:0.658,CAD:1.358,NZD:0.598,CHF:0.905,XAU:2034.5};
                const price=fallback[pair.split('/')[0]]||1;
                const candles=[];
                let p=price;
                for(let i=100;i>0;i--){
                    const ch=(Math.random()-0.5)*0.002;
                    const o=p;
                    p=p*(1+ch);
                    candles.push({t:Date.now()/1000-i*3600,o,h:Math.max(o,p)*1.001,l:Math.min(o,p)*0.999,c:p});
                }
                return{price,candles,dxy:103.5,src:'demo'};
            }
        }
        
        // Компоненты
        function App(){
            const[pair,setPair]=useState(PAIRS[0]);
            const[loading,setLoading]=useState(false);
            const[data,setData]=useState(null);
            const[analysis,setAnalysis]=useState(null);
            const[time,setTime]=useState('');
            const[hour,setHour]=useState(12);
            
            useEffect(()=>{
                const t=setInterval(()=>{
                    const now=new Date();
                    setTime(now.toLocaleTimeString('ru-RU',{timeZone:'Europe/Moscow'}));
                    setHour(parseInt(now.toLocaleTimeString('ru-RU',{hour:'2-digit',timeZone:'Europe/Moscow'})));
                },1000);
                return()=>clearInterval(t);
            },[]);
            
            const scan=useCallback(async()=>{
                setLoading(true);
                try{
                    const d=await getData(pair.p);
                    setData(d);
                    
                    // Анализ
                    const c=d.candles;
                    const cur=d.price;
                    const isJ=pair.p.includes('JPY');
                    const dig=isJ?3:5;
                    
                    const highs=c.slice(-20).map(x=>num(x.h));
                    const lows=c.slice(-20).map(x=>num(x.l));
                    const max20=Math.max(...highs);
                    const min20=Math.min(...lows);
                    const range=max20-min20||0.001;
                    const mid=(max20+min20)/2;
                    const pos=(cur-min20)/range;
                    
                    const zone=pos>0.8?'premium':pos<0.2?'discount':'equilibrium';
                    const atr=c.slice(-14).reduce((a,x,i,arr)=>{
                        if(i===0)return a;
                        const tr=Math.max(num(x.h)-num(x.l),Math.abs(num(x.h)-num(arr[i-1].c)),Math.abs(num(x.l)-num(arr[i-1].c)));
                        return a+tr;
                    },0)/14;
                    
                    // Сетапы
                    const buy=zone==='discount'||zone==='equilibrium'?{
                        entry:`${fmt(min20,dig)} - ${fmt(min20+atr*0.3,dig)}`,
                        sl:fmt(min20-atr*1.5,dig),
                        tp1:fmt(cur+atr*2.5,dig),
                        tp2:fmt(cur+atr*4,dig),
                        rr:'1:2.5',
                        why:`Дискаунт зона (${(pos*100).toFixed(0)}%). Отскок к середине.`
                    }:null;
                    
                    const sell=zone==='premium'||zone==='equilibrium'?{
                        entry:`${fmt(max20-atr*0.3,dig)} - ${fmt(max20,dig)}`,
                        sl:fmt(max20+atr*1.5,dig),
                        tp1:fmt(cur-atr*2.5,dig),
                        tp2:fmt(cur-atr*4,dig),
                        rr:'1:2.5',
                        why:`Премиум зона (${(pos*100).toFixed(0)}%). Отскок к середине.`
                    }:null;
                    
                    setAnalysis({
                        zone,pos,max20,min20,mid,atr:fmt(atr,isJ?2:4),
                        buy,sell,
                        priority:zone==='discount'?'buy':zone==='premium'?'sell':null
                    });
                }finally{
                    setLoading(false);
                }
            },[pair]);
            
            const activeKZ=KZ.find(k=>hour>=k.s&&hour<k.e);
            
            return(
                <div style={{maxWidth:800,margin:'0 auto',padding:16}}>
                    {/* Шапка */}
                    <div className="flex" style={{justifyContent:'space-between',marginBottom:24}}>
                        <div>
                            <h1 style={{fontSize:24,margin:0}}>FX Scanner <span className="text-green">v8</span></h1>
                            <div className="text-gray" style={{fontSize:12}}>ICT · Smart Money</div>
                        </div>
                        <div style={{textAlign:'right'}}>
                            <div style={{fontSize:20,fontWeight:600}}>{time}</div>
                            <div className="text-gray" style={{fontSize:11}}>Москва</div>
                        </div>
                    </div>
                    
                    {/* Сессии */}
                    <div className="grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:24}}>
                        {KZ.map(k=>{
                            const active=hour>=k.s&&hour<k.e;
                            return(
                                <div key={k.n} className="card" style={{
                                    borderColor:active?k.c:'#30363d',
                                    background:active?`${k.c}10`:'#161b22'
                                }}>
                                    <div style={{fontSize:12,color:active?k.c:'#8b949e',fontWeight:600}}>{k.n}</div>
                                    <div className="text-gray" style={{fontSize:11}}>{k.s}:00-{k.e}:00</div>
                                    {active&&<div style={{width:6,height:6,borderRadius:'50%',background:k.c,marginTop:8}} className="loading"/>}
                                </div>
                            );
                        })}
                    </div>
                    
                    {/* Пары */}
                    <div className="grid" style={{gridTemplateColumns:'repeat(3,1fr)',marginBottom:24}}>
                        {PAIRS.map(p=>{
                            const sel=p.p===pair.p;
                            return(
                                <div key={p.p} className="card" onClick={()=>{setPair(p);setData(null);setAnalysis(null);}} style={{
                                    cursor:'pointer',
                                    borderColor:sel?'#238636':'#30363d',
                                    background:sel?'#23863620':'#161b22'
                                }}>
                                    <div style={{fontSize:14,fontWeight:600,color:sel?'#3fb950':'#c9d1d9'}}>{p.p}</div>
                                    <div className="text-gray" style={{fontSize:11}}>{p.t}</div>
                                </div>
                            );
                        })}
                    </div>
                    
                    {/* Результат */}
                    {data&&analysis&&!loading&&(
                        <div style={{marginBottom:100}}>
                            {/* Цена */}
                            <div className="card" style={{marginBottom:16,textAlign:'center'}}>
                                <div style={{fontSize:48,fontWeight:700}}>{fmt(data.price,pair.p.includes('JPY')?3:5)}</div>
                                <div className="text-gray" style={{fontSize:12}}>
                                    {pair.p} · {data.src} · 
                                    <span style={{color:analysis.zone==='premium'?'#f85149':analysis.zone==='discount'?'#3fb950':'#d29922',marginLeft:8,textTransform:'uppercase'}}>
                                        {analysis.zone}
                                    </span>
                                </div>
                            </div>
                            
                            {/* Уровни */}
                            <div className="card" style={{marginBottom:16}}>
                                <div style={{fontSize:12,color:'#8b949e',marginBottom:12}}>КЛЮЧЕВЫЕ УРОВНИ</div>
                                <div className="grid" style={{gridTemplateColumns:'repeat(3,1fr)'}}>
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-red" style={{fontSize:18,fontWeight:600}}>{fmt(analysis.max20)}</div>
                                        <div className="text-gray" style={{fontSize:10}}>Сопротивление</div>
                                    </div>
                                    <div style={{textAlign:'center'}}>
                                        <div style={{fontSize:18,fontWeight:600,color:'#d29922'}}>{fmt(analysis.mid)}</div>
                                        <div className="text-gray" style={{fontSize:10}}>Середина</div>
                                    </div>
                                    <div style={{textAlign:'center'}}>
                                        <div className="text-green" style={{fontSize:18,fontWeight:600}}>{fmt(analysis.min20)}</div>
                                        <div className="text-gray" style={{fontSize:10}}>Поддержка</div>
                                    </div>
                                </div>
                                <div style={{marginTop:12,height:4,background:'#30363d',borderRadius:2,position:'relative'}}>
                                    <div style={{
                                        position:'absolute',
                                        left:`${analysis.pos*100}%`,
                                        top:0,bottom:0,
                                        width:4,
                                        background:'#d29922',
                                        borderRadius:2,
                                        transform:'translateX(-50%)'
                                    }}/>
                                </div>
                                <div className="flex" style={{justifyContent:'space-between',marginTop:8,fontSize:10}}>
                                    <span className="text-gray">0%</span>
                                    <span className="text-gray">Позиция в диапазоне: {(analysis.pos*100).toFixed(0)}%</span>
                                    <span className="text-gray">100%</span>
                                </div>
                            </div>
                            
                            {/* Сетапы */}
                            <div className="grid" style={{gridTemplateColumns:'1fr 1fr',gap:16}}>
                                {analysis.buy&&(
                                    <div className="card" style={{
                                        borderColor:analysis.priority==='buy'?'#3fb950':'#30363d',
                                        background:analysis.priority==='buy'?'#3fb95010':'#161b22'
                                    }}>
                                        <div className="flex" style={{marginBottom:12}}>
                                            <span style={{fontSize:24}}>🚀</span>
                                            <div>
                                                <div className="text-green" style={{fontSize:16,fontWeight:700}}>LONG</div>
                                                {analysis.priority==='buy'&&<div style={{fontSize:10,color:'#3fb950'}}>★ РЕКОМЕНДУЕТСЯ</div>}
                                            </div>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">Вход: </span>
                                            <span style={{color:'#d29922',fontWeight:600}}>{analysis.buy.entry}</span>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">SL: </span>
                                            <span className="text-red">{analysis.buy.sl}</span>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">TP: </span>
                                            <span className="text-green">{analysis.buy.tp1} / {analysis.buy.tp2}</span>
                                        </div>
                                        <div className="text-gray" style={{fontSize:11,marginTop:12,paddingTop:12,borderTop:'1px solid #30363d'}}>
                                            {analysis.buy.why}
                                        </div>
                                    </div>
                                )}
                                
                                {analysis.sell&&(
                                    <div className="card" style={{
                                        borderColor:analysis.priority==='sell'?'#f85149':'#30363d',
                                        background:analysis.priority==='sell'?'#f8514910':'#161b22'
                                    }}>
                                        <div className="flex" style={{marginBottom:12}}>
                                            <span style={{fontSize:24}}>🔻</span>
                                            <div>
                                                <div className="text-red" style={{fontSize:16,fontWeight:700}}>SHORT</div>
                                                {analysis.priority==='sell'&&<div style={{fontSize:10,color:'#f85149'}}>★ РЕКОМЕНДУЕТСЯ</div>}
                                            </div>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">Вход: </span>
                                            <span style={{color:'#d29922',fontWeight:600}}>{analysis.sell.entry}</span>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">SL: </span>
                                            <span className="text-red">{analysis.sell.sl}</span>
                                        </div>
                                        <div style={{fontSize:12,marginBottom:8}}>
                                            <span className="text-gray">TP: </span>
                                            <span className="text-green">{analysis.sell.tp1} / {analysis.sell.tp2}</span>
                                        </div>
                                        <div className="text-gray" style={{fontSize:11,marginTop:12,paddingTop:12,borderTop:'1px solid #30363d'}}>
                                            {analysis.sell.why}
                                        </div>
                                    </div>
                                )}
                            </div>
                            
                            {!analysis.buy&&!analysis.sell&&(
                                <div className="card" style={{textAlign:'center',padding:40}}>
                                    <div style={{fontSize:32,marginBottom:8}}>⚠️</div>
                                    <div style={{fontSize:16,color:'#d29922'}}>Нет сетапа</div>
                                    <div className="text-gray" style={{fontSize:12,marginTop:8}}>Цена вне зон входа</div>
                                </div>
                            )}
                        </div>
                    )}
                    
                    {/* Пусто */}
                    {!data&&!loading&&(
                        <div style={{textAlign:'center',padding:60}}>
                            <div className="text-gray" style={{fontSize:14}}>Выберите пару и нажмите СКАНИРОВАТЬ</div>
                        </div>
                    )}
                    
                    {/* Загрузка */}
                    {loading&&(
                        <div style={{textAlign:'center',padding:60}}>
                            <div className="loading text-green" style={{fontSize:16}}>Анализ...</div>
                        </div>
                    )}
                    
                    {/* Кнопка */}
                    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'#0d1117',borderTop:'1px solid #30363d',padding:16}}>
                        <div style={{maxWidth:800,margin:'0 auto'}}>
                            <button className="btn" onClick={scan} disabled={loading} style={{height:48}}>
                                {loading?'АНАЛИЗ...':'СКАНИРОВАТЬ'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    </script>
</body>
</html>
